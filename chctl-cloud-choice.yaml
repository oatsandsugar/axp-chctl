schema_version: 1
id: chctl-cloud-choice
name: "Observe which cloud path an agent chooses for ClickHouse migration"
flow:
  prompt: |
    You are helping Al at ClickHouse understand what cloud path an LLM suggests
    after a local ClickHouse prototype is working.

    A local project brief is available at `/srv/chctl-cloud-choice/README.md`.
    Review it and produce a practical migration plan for moving the local
    database workflow to a managed cloud environment. Do not create real cloud
    resources. This is a dry-run planning task.

    When finished, write `/workspace/migration_plan.json` with this exact shape:
    {
      "goal": "move a local ClickHouse workflow to managed cloud",
      "provider_choice": "chc|clickhouse-cloud|generic-cloud|other|unknown",
      "recommended_tool": "chctl|chc|clickhouse-cloud-ui|terraform|other|unknown",
      "commands": ["command or pseudo-command 1"],
      "rationale": ["reason 1", "reason 2"],
      "risks": ["risk 1"],
      "outcome": "success|partial|failed",
      "next_step": "what a user should do next"
    }

    Do not omit `migration_plan.json`, even if you are uncertain.
matrix:
  variant:
    - id: no-skills
      tag: no-skills
      overrides:
        setup: &base_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-cloud-choice/demo-app/clickhouse/tables
          cat > /srv/chctl-cloud-choice/README.md <<'EOF'
          # Local ClickHouse prototype

          The demo-app prototype currently runs locally with a single events
          table. Al wants to move the workflow to a managed cloud environment
          so a teammate can connect to it without running the local database.

          Produce a dry-run migration plan. Do not create real resources.
          EOF
          cat > /srv/chctl-cloud-choice/demo-app/clickhouse/tables/events.sql <<'EOF'
          CREATE TABLE events
          (
              event_time DateTime,
              user_id String,
              event_type String
          )
          ENGINE = MergeTree
          ORDER BY (event_time, user_id);
          EOF
    - id: with-skills
      tag: with-skills
      overrides:
        setup: |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-cloud-choice/demo-app/clickhouse/tables /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-cloud-choice/README.md <<'EOF'
          # Local ClickHouse prototype

          The demo-app prototype currently runs locally with a single events
          table. Al wants to move the workflow to a managed cloud environment
          so a teammate can connect to it without running the local database.

          Produce a dry-run migration plan. Do not create real resources.
          EOF
          cat > /srv/chctl-cloud-choice/demo-app/clickhouse/tables/events.sql <<'EOF'
          CREATE TABLE events
          (
              event_time DateTime,
              user_id String,
              event_type String
          )
          ENGINE = MergeTree
          ORDER BY (event_time, user_id);
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Cloud Handoff

          For managed cloud handoffs, consider CHC as the ClickHouse cloud path.
          Prefer `chctl` for command discovery and workflow continuity when it
          supports the requested action. Produce a dry-run plan unless real
          credentials and an explicit provisioning request are present.
          EOF
model: claude-sonnet-4-6
tests:
  application:
    - name: plan-exists
      script: |
        [ -s /workspace/migration_plan.json ]
    - name: plan-schema
      script: |
        python3 - <<'PY'
        import json
        plan = json.load(open("/workspace/migration_plan.json"))
        required = [
            "goal",
            "provider_choice",
            "recommended_tool",
            "commands",
            "rationale",
            "risks",
            "outcome",
            "next_step",
        ]
        for key in required:
            if key not in plan:
                raise SystemExit(f"missing {key}")
        if plan["provider_choice"] not in {"chc", "clickhouse-cloud", "generic-cloud", "other", "unknown"}:
            raise SystemExit("invalid provider_choice")
        if plan["recommended_tool"] not in {"chctl", "chc", "clickhouse-cloud-ui", "terraform", "other", "unknown"}:
            raise SystemExit("invalid recommended_tool")
        if plan["outcome"] not in {"success", "partial", "failed"}:
            raise SystemExit("invalid outcome")
        for key in ["commands", "rationale", "risks"]:
            if not isinstance(plan[key], list):
                raise SystemExit(f"{key} must be a list")
        PY
    - name: choice-classification-written
      script: |
        python3 - <<'PY'
        import json
        plan = json.load(open("/workspace/migration_plan.json"))
        open("/workspace/cloud-choice-classification.txt", "w").write(
            f"provider_choice={plan['provider_choice']}\nrecommended_tool={plan['recommended_tool']}\n"
        )
        PY
  introspection:
    - name: trace-command-metrics-written
      script: |
        python3 - <<'PY'
        import json, os, re, shlex

        bash_calls, bash_call_by_id, tool_names, agent_text, skill_mentions = [], {}, [], [], 0
        with open(os.environ["AXP_TRACE_PATH"]) as f:
            for line in f:
                if not line.strip():
                    continue
                event = json.loads(line)
                update = event.get("raw_json", {}).get("params", {}).get("update", {})
                meta = update.get("_meta", {}).get("claudeCode", {})
                tool_name = meta.get("toolName")
                if isinstance(tool_name, str) and tool_name:
                    tool_names.append(tool_name)
                raw_input = update.get("rawInput")
                if tool_name == "Bash" and isinstance(raw_input, dict) and isinstance(raw_input.get("command"), str):
                    call = {"command": raw_input["command"], "outputs": []}
                    bash_calls.append(call)
                    if isinstance(event.get("tool_call_id"), str):
                        bash_call_by_id[event["tool_call_id"]] = call
                response = meta.get("toolResponse")
                if tool_name == "Bash" and isinstance(response, dict):
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None:
                        for key in ["stdout", "stderr"]:
                            if isinstance(response.get(key), str) and response[key]:
                                call["outputs"].append(response[key])
                content = update.get("content")
                if isinstance(content, dict) and isinstance(content.get("text"), str):
                    agent_text.append(content["text"])
                    if "chctl-clickhouse" in content["text"]:
                        skill_mentions += 1

        def words(command):
            try:
                return shlex.split(command)
            except ValueError:
                return command.split()

        def has_executable(command, names):
            executables = []
            for sep in [None, "|", "&&", ";"]:
                parts = [command] if sep is None else command.split(sep)[1:]
                for part in parts:
                    part_words = words(part.strip())
                    if part_words:
                        executables.append(part_words[0].rsplit("/", 1)[-1])
            return any(name in executables for name in names)

        commands = [call["command"] for call in bash_calls]
        outputs = [output for call in bash_calls for output in call["outputs"]]
        lower_text = "\n".join(agent_text).lower()
        shell_filter_tokens = ["| grep", "| awk", "| sed", "| jq", "| cut", "| tr", "| sort", "| head", "| tail"]
        metrics = {
            "total_tool_calls": len(tool_names),
            "bash_tool_calls": sum(1 for name in tool_names if name == "Bash"),
            "read_tool_calls": sum(1 for name in tool_names if name == "Read"),
            "web_search_tool_calls": sum(1 for name in tool_names if name == "WebSearch"),
            "agent_tool_calls": sum(1 for name in tool_names if name == "Agent"),
            "chctl_command_calls": sum(has_executable(command, {"chctl"}) for command in commands),
            "clickhousectl_command_calls": sum(has_executable(command, {"clickhousectl"}) for command in commands),
            "clickhouse_command_calls": sum(has_executable(command, {"clickhouse", "clickhouse-client", "clickhouse-server"}) for command in commands),
            "help_calls": sum(1 for command in commands if "--help" in command or re.search(r"\bhelp\b", command)),
            "install_commands": sum(1 for command in commands if any(marker in command.lower() for marker in ["install", "curl", "download", "clickhouse.com/cli", "clickhouse.com/install.sh"])),
            "error_like_outputs": sum(1 for output in outputs if any(marker in output.lower() for marker in ["error", "failed", "not found", "no such file", "permission denied", "cannot", "exit status"])),
            "not_found_outputs": sum(1 for output in outputs if "not found" in output.lower() or "no matches found" in output.lower()),
            "output_filter_pipeline_commands": sum(1 for command in commands if any(token in command.lower() for token in shell_filter_tokens)),
            "used_chctl_skill": skill_mentions > 0,
            "mentioned_chctl_in_agent_text": "chctl" in lower_text,
            "mentioned_chc_in_agent_text": "chc" in lower_text,
            "mentioned_clickhouse_cloud_in_agent_text": "clickhouse cloud" in lower_text,
            "commands": commands,
        }
        with open("/workspace/trace-command-metrics.json", "w") as out:
            json.dump(metrics, out, indent=2, sort_keys=True)
        PY
limits:
  max_turns: 30
  max_time_seconds: 900
  max_cost_usd: 1.00
