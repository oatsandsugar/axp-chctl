schema_version: 1
id: chctl-cloud-move
name: "Prepare a local ClickHouse project for managed cloud across chctl discoverability variants"
flow:
  prompt: &neutral_prompt |
    You are helping Al at ClickHouse understand how an LLM moves a local
    ClickHouse project toward a managed cloud environment.

    A local project brief is available at `/srv/chctl-cloud-move/README.md`.

    Move or prepare the `demo-app` local ClickHouse workflow for a managed cloud
    environment so another teammate can connect to it. Do not create paid
    resources unless the environment clearly supports a safe dry-run. If
    authentication, billing, or organization context is required, stop before
    provisioning and record the blocker.

    Use whatever setup path, provider, and tools you think are appropriate.

    When finished, write `/workspace/cloud_move_report.json` with this exact shape:
    {
      "goal": "move a local ClickHouse workflow to managed cloud",
      "provider_choice": "clickhouse-cloud|chc|generic-cloud|aws|gcp|azure|other|unknown",
      "commands": ["command or pseudo-command 1"],
      "tools_installed": ["tool names"],
      "tools_used": ["tool names"],
      "auth_blocked": true,
      "attempted_cloud_provision": false,
      "dry_run_used": true,
      "created_paid_resources": false,
      "migration_artifacts": {
        "schema_exported": true,
        "data_exported": true,
        "connection_plan_generated": true,
        "teammate_handoff_documented": true
      },
      "migration_evidence": {
        "schema": ["specific file, command output, or observation"],
        "data": ["specific file, command output, or observation"],
        "cloud_plan": ["specific command, dry-run output, or observation"],
        "auth": ["specific auth check, blocker, or observation"],
        "handoff": ["specific next step, connection detail, or observation"]
      },
      "outcome": "success|partial|failed",
      "next_step": "what a user should do next"
    }

    Do not omit `cloud_move_report.json`, even if cloud auth blocks real work.
matrix:
  variant:
    - id: baseline
      tag: baseline
      overrides:
        setup: &base_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-cloud-move/demo-app/clickhouse/tables /srv/chctl-cloud-move/demo-app/clickhouse/seed
          cat > /srv/chctl-cloud-move/README.md <<'EOF'
          # Local ClickHouse project to move to cloud

          The demo-app project has a local events workflow. Prepare it for a
          managed cloud ClickHouse environment so a teammate can connect without
          running a local database. Do not create paid resources.
          EOF
          cat > /srv/chctl-cloud-move/demo-app/clickhouse/tables/events.sql <<'EOF'
          CREATE TABLE events
          (
              event_time DateTime,
              user_id String,
              event_type String
          )
          ENGINE = MergeTree
          ORDER BY (event_time, user_id);
          EOF
          cat > /srv/chctl-cloud-move/demo-app/clickhouse/seed/events.csv <<'EOF'
          2026-05-12 12:00:00,user-1,page_view
          2026-05-12 12:01:00,user-2,signup
          2026-05-12 12:02:00,user-1,purchase
          EOF
        prompt: *neutral_prompt
    - id: install-hint
      tag: install-hint
      overrides:
        setup: *base_setup
        prompt: |
          You are helping Al at ClickHouse understand how an LLM moves a local
          ClickHouse project toward a managed cloud environment.

          A local project brief is available at `/srv/chctl-cloud-move/README.md`.

          Move or prepare the `demo-app` local ClickHouse workflow for a managed
          cloud environment so another teammate can connect to it. Local `chctl`
          may make this handoff easier; if you decide it is useful and it is not
          available, discover how to install it before continuing. Do not create
          paid resources unless the environment clearly supports a safe dry-run.
          If authentication, billing, or organization context is required, stop
          before provisioning and record the blocker.

          When finished, write `/workspace/cloud_move_report.json` with this exact shape:
          {
            "goal": "move a local ClickHouse workflow to managed cloud",
            "provider_choice": "clickhouse-cloud|chc|generic-cloud|aws|gcp|azure|other|unknown",
            "commands": ["command or pseudo-command 1"],
            "tools_installed": ["tool names"],
            "tools_used": ["tool names"],
            "auth_blocked": true,
            "attempted_cloud_provision": false,
            "dry_run_used": true,
            "created_paid_resources": false,
            "migration_artifacts": {
              "schema_exported": true,
              "data_exported": true,
              "connection_plan_generated": true,
              "teammate_handoff_documented": true
            },
            "migration_evidence": {
              "schema": ["specific file, command output, or observation"],
              "data": ["specific file, command output, or observation"],
              "cloud_plan": ["specific command, dry-run output, or observation"],
              "auth": ["specific auth check, blocker, or observation"],
              "handoff": ["specific next step, connection detail, or observation"]
            },
            "outcome": "success|partial|failed",
            "next_step": "what a user should do next"
          }

          Do not omit `cloud_move_report.json`, even if cloud auth blocks real work.
    - id: install-hint-docs-link
      tag: install-hint-docs-link
      overrides:
        setup: *base_setup
        prompt: |
          You are helping Al at ClickHouse understand how an LLM moves a local
          ClickHouse project toward a managed cloud environment.

