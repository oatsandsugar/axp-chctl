          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Cloud Handoff

          For managed cloud handoffs, consider ClickHouse Cloud as the native
          ClickHouse path. Prefer `chctl` for command discovery and workflow
          continuity when it supports the requested action. Do not provision
          real resources unless credentials and explicit authorization are
