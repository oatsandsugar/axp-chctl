schema_version: 1
id: chctl-discovery-install
name: "Discover whether an agent installs the ClickHouse local project CLI"
flow:
  prompt: |
    You are helping Al at ClickHouse understand how an LLM approaches a new
    local ClickHouse project from scratch.

    Create a new local project called `demo-app` for experimenting with
    ClickHouse. Use whatever setup path you think is appropriate. If you
    install any CLI or other tool, record exactly what you installed and why.

    When finished, write `/workspace/report.json` with this exact shape:
    {
      "goal": "create a local ClickHouse project",
      "commands": ["command 1", "command 2"],
      "tools_installed": ["tool names"],
      "tools_used": ["tool names"],
      "project_path": "/workspace/demo-app",
      "outcome": "success|partial|failed",
      "evidence": ["specific file, command output, or observation"],
      "next_step": "what a user should do next"
    }

    Do not omit `report.json`, even if the project setup only partially works.
matrix:
  variant:
    - id: baseline
      tag: baseline
model: claude-sonnet-4-6
tests:
  application:
    - name: report-exists
      script: |
        [ -s /workspace/report.json ]
    - name: report-schema
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        required = [
            "goal",
            "commands",
            "tools_installed",
            "tools_used",
            "project_path",
            "outcome",
            "evidence",
            "next_step",
        ]
        for key in required:
            if key not in report:
                raise SystemExit(f"missing {key}")
        if report["outcome"] not in {"success", "partial", "failed"}:
            raise SystemExit("invalid outcome")
        for key in ["commands", "tools_installed", "tools_used", "evidence"]:
            if not isinstance(report[key], list):
                raise SystemExit(f"{key} must be a list")
        PY
    - name: project-path-recorded
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        if "demo-app" not in str(report.get("project_path", "")):
            raise SystemExit("project_path should refer to demo-app")
        PY
    - name: project-scaffold-exists
      script: |
        python3 - <<'PY'
        import pathlib
        root = pathlib.Path("/workspace/demo-app")
        if not root.exists() or not root.is_dir():
            raise SystemExit("/workspace/demo-app was not created")
        files = [path for path in root.rglob("*") if path.is_file()]
        if not files:
            raise SystemExit("/workspace/demo-app does not contain scaffold files")
        PY
    - name: discovery-classification-written
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        text = " ".join(
            str(item)
            for key in ["commands", "tools_installed", "tools_used", "evidence"]
            for item in report.get(key, [])
        ).lower()
        used_chctl = "chctl" in text
        used_clickhousectl = "clickhousectl" in text
        mentioned_clickhouse = "clickhouse" in text
        open("/workspace/discovery-classification.txt", "w").write(
            "used_chctl=" + str(used_chctl).lower() + "\n"
            + "used_clickhousectl=" + str(used_clickhousectl).lower() + "\n"
            + "mentioned_clickhouse=" + str(mentioned_clickhouse).lower() + "\n"
        )
        PY
  introspection:
    - name: trace-command-metrics-written
      script: |
        python3 - <<'PY'
        import json, os, re, shlex

        bash_calls, bash_call_by_id, tool_names, agent_text = [], {}, [], []
        with open(os.environ["AXP_TRACE_PATH"]) as f:
            for line in f:
                if not line.strip():
                    continue
                event = json.loads(line)
                update = event.get("raw_json", {}).get("params", {}).get("update", {})
                meta = update.get("_meta", {}).get("claudeCode", {})
                tool_name = meta.get("toolName")
                if isinstance(tool_name, str) and tool_name:
                    tool_names.append(tool_name)
                raw_input = update.get("rawInput")
                if tool_name == "Bash" and isinstance(raw_input, dict) and isinstance(raw_input.get("command"), str):
                    call = {"command": raw_input["command"], "outputs": []}
                    bash_calls.append(call)
                    if isinstance(event.get("tool_call_id"), str):
                        bash_call_by_id[event["tool_call_id"]] = call
                response = meta.get("toolResponse")
                if tool_name == "Bash" and isinstance(response, dict):
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None:
                        for key in ["stdout", "stderr"]:
                            if isinstance(response.get(key), str) and response[key]:
                                call["outputs"].append(response[key])
                content = update.get("content")
                if isinstance(content, dict) and isinstance(content.get("text"), str):
                    agent_text.append(content["text"])

        def words(command):
            try:
                return shlex.split(command)
            except ValueError:
                return command.split()

        def has_executable(command, names):
            executables = []
            for sep in [None, "|", "&&", ";"]:
                parts = [command] if sep is None else command.split(sep)[1:]
                for part in parts:
                    part_words = words(part.strip())
                    if part_words:
                        executables.append(part_words[0].rsplit("/", 1)[-1])
            return any(name in executables for name in names)

        commands = [call["command"] for call in bash_calls]
        outputs = [output for call in bash_calls for output in call["outputs"]]
        lower_text = "\n".join(agent_text).lower()
        shell_filter_tokens = ["| grep", "| awk", "| sed", "| jq", "| cut", "| tr", "| sort", "| head", "| tail"]

        metrics = {
            "total_tool_calls": len(tool_names),
            "bash_tool_calls": sum(1 for name in tool_names if name == "Bash"),
            "read_tool_calls": sum(1 for name in tool_names if name == "Read"),
            "web_search_tool_calls": sum(1 for name in tool_names if name == "WebSearch"),
            "agent_tool_calls": sum(1 for name in tool_names if name == "Agent"),
            "chctl_command_calls": sum(has_executable(command, {"chctl"}) for command in commands),
            "clickhousectl_command_calls": sum(has_executable(command, {"clickhousectl"}) for command in commands),
            "clickhouse_command_calls": sum(has_executable(command, {"clickhouse", "clickhouse-client", "clickhouse-server"}) for command in commands),
            "help_calls": sum(1 for command in commands if "--help" in command or re.search(r"\bhelp\b", command)),
            "install_commands": sum(1 for command in commands if any(marker in command.lower() for marker in ["install", "curl", "download", "clickhouse.com/cli", "clickhouse.com/install.sh"])),
            "error_like_outputs": sum(1 for output in outputs if any(marker in output.lower() for marker in ["error", "failed", "not found", "no such file", "permission denied", "cannot", "exit status"])),
            "not_found_outputs": sum(1 for output in outputs if "not found" in output.lower() or "no matches found" in output.lower()),
            "output_filter_pipeline_commands": sum(1 for command in commands if any(token in command.lower() for token in shell_filter_tokens)),
            "mentioned_chctl_in_agent_text": "chctl" in lower_text,
            "mentioned_clickhousectl_in_agent_text": "clickhousectl" in lower_text,
            "commands": commands,
        }
        with open("/workspace/trace-command-metrics.json", "w") as out:
            json.dump(metrics, out, indent=2, sort_keys=True)
        PY
limits:
  max_turns: 30
  max_time_seconds: 900
  max_cost_usd: 1.00
