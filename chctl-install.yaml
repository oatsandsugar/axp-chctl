# yaml-language-server: $schema=https://docs.514.ai/schema/scenario.v1.schema.yaml
# AXP scenario. Full field reference: AGENTS.md (Scenario object model).
# Worked examples: examples/ (git-init-commit, pattern-search-*).

schema_version: 1            # bump is breaking; pin to 1.
id: chctl-install          # kebab-case; matches the file name.
name: "Compare two CLI variants"
description: |
  Context used when optionally analyzing which CLI variant produced the better outcome.

flow:
  # The task given to the agent. Same prompt across variants unless overridden.
  prompt: |
    Set up a new project called `demo-app` and run it locally.

matrix:
  # Each variant re-runs `flow.prompt` with optional overrides (setup / prompt / model).
  # 1 scenario × N variants = N evaluations.
  variant:
    - id: v1
      tag: variant-a
      overrides:
        # bash applied as a Docker layer on top of axp-base before the agent runs.
        # e.g. install variant A of the binary under test:
        setup: |
          # curl -fsSL https://example.com/cli/variant-a -o /usr/local/bin/mycli
          # chmod +x /usr/local/bin/mycli
    - id: v2
      tag: variant-b
      overrides:
        setup: |
          # variant B of the binary under test:
          # curl -fsSL https://example.com/cli/variant-b -o /usr/local/bin/mycli
          # chmod +x /usr/local/bin/mycli

model: claude-sonnet-4-6     # default model; overridable per variant.

tests:
  # application: did the resulting state match what we wanted? (files, endpoints, commands)
  application:
    - name: dev-server-healthy
      script: |
        curl -fsS http://localhost:4000/health
  # introspection: did the agent get there sensibly? (inspect $AXP_TRACE_PATH)
  introspection:
    - name: under-30-tool-calls
      script: |
        [ "$(jq '.tool_calls | length' "$AXP_TRACE_PATH")" -lt 30 ]

# Hard stops. The run aborts if any limit is exceeded.
limits:
  max_turns: 50
  max_time_seconds: 900
  max_cost_usd: 1.00
