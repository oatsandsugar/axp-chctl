    - id: chctl-preinstalled
      tag: chctl-preinstalled
      overrides:
        setup: &chctl_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          ln -sf "$HOME/.local/bin/chctl" /usr/local/bin/chctl
          ln -sf "$HOME/.local/bin/clickhousectl" /usr/local/bin/clickhousectl || true
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse workflow task

          Create a local ClickHouse workflow for a new project called demo-app.
          Initialize the project, create a database, create an events table,
          seed rows containing page_view, signup, and purchase, then query the
          seeded rows.

          Note: ClickHouse local workflow tooling is already installed.
          EOF
        prompt: *neutral_prompt
    - id: chctl-preinstalled-skills-hint
      tag: chctl-preinstalled-skills-hint
      overrides:
        setup: *chctl_setup
        prompt: |
          You are helping Al at ClickHouse understand how an LLM completes a local
          ClickHouse workflow from scratch.

          A task brief is available at `/srv/chctl-local-db/README.md`.

          Complete this workflow for the `demo-app` project at
          `/srv/chctl-local-db/demo-app`:

          1. Initialize a project structure.
          2. Create a local database named `demo_app`.
          3. Create a table named `demo_app.events` for sample events.
          4. Seed at least three rows containing the event types `page_view`,
             `signup`, and `purchase`.
          5. Query `demo_app.events` and verify the seeded rows are present.

          Use whatever setup path and tools you think are appropriate. Relevant
          agent skills may exist for this workflow; if you think they would help,
          discover, install, or load them using whatever mechanism you think is
          appropriate.

          Once you have successfully queried the seeded rows, stop working and
          end the session cleanly. The test harness will verify the database
          state and inspect the trace; do not write a separate summary report.
    - id: chctl-preinstalled-skills-preinstalled
      tag: chctl-preinstalled-skills-preinstalled
      overrides:
        setup: &chctl_skills_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          ln -sf "$HOME/.local/bin/chctl" /usr/local/bin/chctl
          ln -sf "$HOME/.local/bin/clickhousectl" /usr/local/bin/clickhousectl || true
          mkdir -p /srv/chctl-local-db/demo-app /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse workflow task

          Create a local ClickHouse workflow for a new project called demo-app.
          Initialize the project, create a database, create an events table,
          seed rows containing page_view, signup, and purchase, then query the
          seeded rows.

          Note: ClickHouse local workflow tooling is already installed.
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Workflow

          Use `chctl` as the primary interface for local ClickHouse project work.
          For local workflows, inspect `chctl --help`, initialize the project,
          start a local database, create schema and seed data through the local
          client, and verify queries before reporting success. Run project-scoped
          commands from the project directory.
          EOF
        prompt: *neutral_prompt
model: claude-sonnet-4-6
tests:
  application:
    - name: seeded-rows-queryable
      script: |
        python3 - <<'PY'
        import json
        import subprocess
        import urllib.parse
        import urllib.request

        query = """
        SELECT
          count() AS total,
          countIf(event_type = 'page_view') AS page_view_rows,
          countIf(event_type = 'signup') AS signup_rows,
          countIf(event_type = 'purchase') AS purchase_rows
        FROM demo_app.events
        """

        def query_http():
            url = "http://127.0.0.1:8123/?" + urllib.parse.urlencode({"query": query})
            with urllib.request.urlopen(url, timeout=5) as response:
                return response.read().decode().strip()

        def run_query_candidates(candidates):
            errors = []
            for method_name, command in candidates:
                try:
                    result = subprocess.run(command, text=True, capture_output=True, timeout=10)
                except (FileNotFoundError, subprocess.TimeoutExpired) as exc:
                    errors.append(f"{method_name}: {exc}")
                    continue
                if result.returncode == 0 and result.stdout.strip():
                    return method_name, result.stdout.strip()
                errors.append(
                    f"{method_name}: exit={result.returncode} "
                    f"stdout={result.stdout.strip()!r} stderr={result.stderr.strip()!r}"
                )
            raise RuntimeError("no ClickHouse query path succeeded:\n" + "\n".join(errors))

        def query_cli():
            candidates = [
                ("clickhouse-client", ["clickhouse-client", "--query", query]),
                ("clickhouse-client-subcommand", ["clickhouse", "client", "--query", query]),
                ("workspace-clickhouse-client", ["/workspace/clickhouse", "client", "--query", query]),
            ]
            return run_query_candidates(candidates)

        def query_clickhouse_local():
            candidates = []
            for binary in ["clickhouse", "/workspace/clickhouse"]:
                for path in [
                    "/srv/chctl-local-db/demo-app/data",
                    "/srv/chctl-local-db/demo-app/db",
                    "/workspace/demo-app/data",
                    "/workspace/demo-app/db",
                ]:
                    candidates.append(
                        (
                            f"{binary} local --path {path}",
                            [binary, "local", "--path", path, "--query", query],
                        )
                    )
            return run_query_candidates(candidates)

        try:
            raw = query_http()
            method = "http"
        except Exception:
            try:
                method, raw = query_cli()
            except Exception:
                method, raw = query_clickhouse_local()

        parts = raw.replace("\t", " ").split()
        if len(parts) < 4:
            raise SystemExit(f"unexpected query output: {raw!r}")
        total, page_view_rows, signup_rows, purchase_rows = map(int, parts[:4])
        if total < 3:
            raise SystemExit(f"expected at least 3 rows, got {total}")
        if page_view_rows < 1 or signup_rows < 1 or purchase_rows < 1:
            raise SystemExit(
                "expected at least one page_view, signup, and purchase row; "
                f"got page_view={page_view_rows}, signup={signup_rows}, purchase={purchase_rows}"
            )

        summary = {
            "method": method,
            "total_rows": total,
            "page_view_rows": page_view_rows,
            "signup_rows": signup_rows,
            "purchase_rows": purchase_rows,
        }
        with open("/workspace/local-workflow-summary.json", "w") as out:
            json.dump(summary, out, indent=2, sort_keys=True)
        PY
  introspection:
    - name: trace-command-metrics-written
      script: |
        python3 - <<'PY'
        import json
        import os
        import re
        import shlex

        bash_calls = []
        bash_call_by_id = {}
        tool_names = []
        agent_text = []
        skill_names_used = []
        written_paths = []

        with open(os.environ["AXP_TRACE_PATH"]) as f:
            for line in f:
                if not line.strip():
                    continue
                event = json.loads(line)
                raw = event.get("raw_json", {})
                update = raw.get("params", {}).get("update", {})
                meta = update.get("_meta", {}).get("claudeCode", {})
                tool_name = meta.get("toolName")
                if isinstance(tool_name, str) and tool_name:
                    tool_names.append(tool_name)

                raw_input = update.get("rawInput")
                if tool_name == "Bash" and isinstance(raw_input, dict):
                    command = raw_input.get("command")
                    if isinstance(command, str):
                        tool_call_id = event.get("tool_call_id")
                        call = {"command": command, "outputs": [], "failed": False}
                        bash_calls.append(call)
                        if isinstance(tool_call_id, str):
                            bash_call_by_id[tool_call_id] = call
                elif tool_name == "Skill" and isinstance(raw_input, dict):
                    skill = raw_input.get("skill") or raw_input.get("commandName")
                    if isinstance(skill, str):
                        skill_names_used.append(skill)
                elif tool_name in {"Write", "Edit", "MultiEdit"} and isinstance(raw_input, dict):
                    path = raw_input.get("file_path") or raw_input.get("path")
                    if isinstance(path, str):
                        written_paths.append(path)

                tool_response = meta.get("toolResponse")
                if tool_name == "Bash" and isinstance(tool_response, dict):
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    for key in ["stdout", "stderr"]:
                        value = tool_response.get(key)
                        if isinstance(value, str) and value:
                            if call is not None:
                                call["outputs"].append(value)

                if update.get("status") == "failed":
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None:
                        call["failed"] = True
                        raw_output = update.get("rawOutput")
                        if isinstance(raw_output, str) and raw_output:
                            call["outputs"].append(raw_output)

                raw_output = update.get("rawOutput")
                if tool_name == "Bash" and isinstance(raw_output, str) and raw_output:
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None and raw_output not in call["outputs"]:
                        call["outputs"].append(raw_output)

                content = update.get("content")
                if isinstance(content, dict):
                    text = content.get("text")
                    if isinstance(text, str):
                        agent_text.append(text)
                elif isinstance(content, list):
                    for item in content:
                        if isinstance(item, dict):
                            inner = item.get("content")
                            if isinstance(inner, dict) and isinstance(inner.get("text"), str):
                                agent_text.append(inner["text"])

        def shell_words(command):
            try:
                return shlex.split(command)
            except ValueError:
                return command.split()

        def command_parts(command):
            parts = [command]
            for sep in ["&&", ";", "|"]:
                expanded = []
                for part in parts:
                    expanded.extend(part.split(sep))
                parts = expanded
            return [part.strip() for part in parts if part.strip()]

        def executable_tokens(command):
            tokens = []
            skip = {"sudo", "env", "command", "time", "timeout"}
            for part in command_parts(command):
                words = shell_words(part)
                while words and ("=" in words[0] and not words[0].startswith("-")):
                    words = words[1:]
                if words and words[0] == "cd":
                    continue
                if words and words[0] in skip and len(words) > 1:
                    words = words[1:]
                if words:
                    tokens.append(words[0].rsplit("/", 1)[-1])
            return tokens

        def has_executable(command, names):
            return any(token in names for token in executable_tokens(command))

        def command_mentions_chctl(command):
            return has_executable(command, {"chctl", "clickhousectl"})

        def command_mentions_raw_clickhouse(command):
            return has_executable(command, {"clickhouse", "clickhouse-client", "clickhouse-server"})

        def command_is_help(command):
            return "--help" in command or re.search(r"\bhelp\b", command) is not None

        def command_in_demo_app(command):
            return (
                "cd /srv/chctl-local-db/demo-app" in command
                or "cd /workspace/demo-app" in command
                or "cd demo-app" in command
            )

        bash_commands = [call["command"] for call in bash_calls]
        bash_outputs = [output for call in bash_calls for output in call["outputs"]]
        all_text = "\n".join(agent_text).lower()
        all_outputs = "\n".join(bash_outputs).lower()

        chctl_command_indexes = [
            idx for idx, command in enumerate(bash_commands)
            if command_mentions_chctl(command)
        ]
        first_chctl_command_index = chctl_command_indexes[0] if chctl_command_indexes else -1
        raw_clickhouse_after_chctl = bool(chctl_command_indexes) and any(
            command_mentions_raw_clickhouse(command)
            for idx, command in enumerate(bash_commands)
            if idx > first_chctl_command_index
        )

        error_markers = ["error", "failed", "not found", "no such file", "permission denied", "cannot", "exit status", "unrecognized subcommand"]
        failed_command_calls = 0
        failed_chctl_command_calls = 0
        hallucinated_chctl_commands = []
        for call in bash_calls:
            output = "\n".join(call["outputs"]).lower()
            failed = call["failed"] or any(marker in output for marker in error_markers)
            if failed:
                failed_command_calls += 1
            if command_mentions_chctl(call["command"]) and failed:
                failed_chctl_command_calls += 1
                if "unrecognized subcommand" in output or "unknown command" in output:
                    hallucinated_chctl_commands.append(call["command"])

        npx_skills_commands = [
            command for command in bash_commands
            if re.search(r"(^|[;&|]\s*)npx\s+skills\b", command)
        ]
        chctl_skills_commands = [
            command for command in bash_commands
            if re.search(r"\b(chctl|clickhousectl)\s+skills\b", command)
        ]
        sideload_patterns = [
            ".claude/skills",
            "/root/.claude/skills",
            ".agents/skills",
            "/root/.agents/skills",
            ".cursor/rules",
            ".cursor/skills",
            "AGENTS.md",
            "CLAUDE.md",
            "SKILL.md",
        ]
        skill_sideload_commands = [
            command for command in bash_commands
            if any(pattern in command for pattern in sideload_patterns)
        ]
        skill_sideload_paths = sorted({
            path for path in written_paths
            if any(pattern in path for pattern in sideload_patterns)
        })

        workflow_keywords = {
            "project_init_command_calls": ["local init", "mkdir", "init"],
            "database_command_calls": ["create database"],
            "table_command_calls": ["create table"],
            "seed_command_calls": ["insert into"],
            "query_command_calls": ["select", "query"],
        }
        lowered_commands = [command.lower() for command in bash_commands]

        metrics = {
            "total_tool_calls": len(tool_names),
            "bash_tool_calls": sum(1 for name in tool_names if name == "Bash"),
            "read_tool_calls": sum(1 for name in tool_names if name == "Read"),
            "write_tool_calls": sum(1 for name in tool_names if name in {"Write", "Edit", "MultiEdit"}),
            "web_search_tool_calls": sum(1 for name in tool_names if name == "WebSearch"),
            "agent_tool_calls": sum(1 for name in tool_names if name == "Agent"),
            "skill_tool_calls": sum(1 for name in tool_names if name == "Skill"),
            "skill_names_used": sorted(set(skill_names_used)),
            "chctl_command_calls": sum(command_mentions_chctl(command) for command in bash_commands),
            "clickhouse_command_calls": sum(command_mentions_raw_clickhouse(command) for command in bash_commands),
            "first_chctl_command_index": first_chctl_command_index,
            "raw_clickhouse_fallback_after_chctl": raw_clickhouse_after_chctl,
            "help_command_calls_total": sum(command_is_help(command) for command in bash_commands),
            "chctl_help_calls": sum(command_mentions_chctl(command) and command_is_help(command) for command in bash_commands),
            "clickhouse_help_calls": sum(command_mentions_raw_clickhouse(command) and command_is_help(command) for command in bash_commands),
            "other_help_calls": sum(
                command_is_help(command)
                and not command_mentions_chctl(command)
                and not command_mentions_raw_clickhouse(command)
                for command in bash_commands
            ),
            "install_command_calls": sum(1 for command in bash_commands if any(marker in command.lower() for marker in ["install", "curl", "download", "clickhouse.com/cli", "clickhouse.com/install.sh"])),
            "error_like_outputs": sum(1 for output in bash_outputs if any(marker in output.lower() for marker in error_markers)),
            "not_found_outputs": sum(1 for output in bash_outputs if "not found" in output.lower() or "no matches found" in output.lower()),
            "failed_command_calls": failed_command_calls,
            "failed_chctl_command_calls": failed_chctl_command_calls,
            "hallucinated_chctl_commands": hallucinated_chctl_commands,
            "chctl_commands_run_in_demo_app": sum(command_mentions_chctl(command) and command_in_demo_app(command) for command in bash_commands),
            "chctl_commands_run_outside_demo_app": sum(command_mentions_chctl(command) and not command_in_demo_app(command) for command in bash_commands),
            "npx_skills_command_calls": len(npx_skills_commands),
            "npx_skills_commands": npx_skills_commands,
            "chctl_skills_command_calls": len(chctl_skills_commands),
            "chctl_skills_commands": chctl_skills_commands,
            "skill_sideload_attempted": bool(skill_sideload_commands or skill_sideload_paths),
            "skill_sideload_commands": skill_sideload_commands,
            "skill_sideload_paths": skill_sideload_paths,
            "mentioned_skill_in_agent_text": "skill" in all_text,
            "mentioned_chctl_in_agent_text": "chctl" in all_text,
            "mentioned_clickhousectl_in_agent_text": "clickhousectl" in all_text,
            "commands": bash_commands,
        }
        for metric_name, keywords in workflow_keywords.items():
            metrics[metric_name] = sum(any(keyword in command for keyword in keywords) for command in lowered_commands)

        with open("/workspace/trace-command-metrics.json", "w") as out:
            json.dump(metrics, out, indent=2, sort_keys=True)
        PY
limits:
  max_turns: 55
  max_time_seconds: 1500
  max_cost_usd: 2.00
