schema_version: 1
id: chctl-local-db
name: "Stand up a local ClickHouse database across install, skills, and nudge variants"
flow:
  prompt: &neutral_prompt |
    You are helping Al at ClickHouse test whether an LLM can stand up a local
    ClickHouse database workflow.

    A task brief is available at `/srv/chctl-local-db/README.md`.

    Initialize or stand up a local ClickHouse database for the `demo-app`
    project using whatever setup path you think is appropriate. If you need a
    CLI or other tool that is not already available, discover and install it.
    Capture the commands you run, any install path you attempted, and the
    evidence that the local database is available. If the database cannot be
    started, explain exactly where it failed.

    When finished, write `/workspace/report.json` with this exact shape:
    {
      "goal": "stand up a local ClickHouse database",
      "commands": ["command 1", "command 2"],
      "tools_installed": ["tool names"],
      "tools_used": ["tool names"],
      "install_attempted": true,
      "install_status": "not-needed|success|partial|failed|not-attempted",
      "install_evidence": ["specific install command, output, or observation"],
      "local_db_status": "running|created|partial|failed",
      "connection_evidence": ["specific file, command output, port, or observation"],
      "outcome": "success|partial|failed",
      "next_step": "what a user should do next"
    }

    Do not omit `report.json`, even if the local database only partially works.
matrix:
  variant:
    - id: no-install-no-skills-no-nudge
      tag: no-install-no-skills-no-nudge
      overrides:
        setup: &base_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.
          EOF
    - id: no-install-no-skills-chctl-nudge
      tag: no-install-no-skills-chctl-nudge
      overrides:
        setup: *base_setup
        prompt: &chctl_nudge_prompt |
          You are helping Al at ClickHouse test whether an LLM can use `chctl`
          for a local database workflow.

          A task brief is available at `/srv/chctl-local-db/README.md`.

          Use `chctl` to initialize or stand up a local ClickHouse database for
          the `demo-app` project. If `chctl` is not already available, discover
          and install it as part of the task. Capture the commands you run, the
          install path you attempted, and the evidence that the local database
          is available. If the database cannot be started, explain exactly where
          it failed.

          When finished, write `/workspace/report.json` with this exact shape:
          {
            "goal": "stand up a local ClickHouse database",
            "commands": ["command 1", "command 2"],
            "tools_installed": ["tool names"],
            "tools_used": ["tool names"],
            "install_attempted": true,
            "install_status": "not-needed|success|partial|failed|not-attempted",
            "install_evidence": ["specific install command, output, or observation"],
            "local_db_status": "running|created|partial|failed",
            "connection_evidence": ["specific file, command output, port, or observation"],
            "outcome": "success|partial|failed",
            "next_step": "what a user should do next"
          }

          Do not omit `report.json`, even if the local database only partially works.
    - id: no-install-with-skills-no-nudge
      tag: no-install-with-skills-no-nudge
      overrides:
        setup: &skills_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-local-db/demo-app /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Workflow

          Use `chctl` as the primary interface for local ClickHouse project work.
          For local workflows, inspect `chctl --help`, initialize the project,
          start a local database, and verify connectivity before reporting
          success. Record the exact `chctl` commands used.
          EOF
        prompt: *neutral_prompt
    - id: no-install-with-skills-chctl-nudge
      tag: no-install-with-skills-chctl-nudge
      overrides:
        setup: *skills_setup
        prompt: *chctl_nudge_prompt
    - id: installed-no-skills-no-nudge
      tag: installed-no-skills-no-nudge
      overrides:
        setup: &installed_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.

          Note: chctl is already installed in this environment.
          EOF
        prompt: *neutral_prompt
    - id: installed-no-skills-chctl-nudge
      tag: installed-no-skills-chctl-nudge
      overrides:
        setup: *installed_setup
        prompt: *chctl_nudge_prompt
    - id: installed-with-skills-no-nudge
      tag: installed-with-skills-no-nudge
      overrides:
        setup: &installed_skills_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-local-db/demo-app /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.

          Note: chctl is already installed in this environment.
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Workflow

          Use `chctl` as the primary interface for local ClickHouse project work.
          For local workflows, inspect `chctl --help`, initialize the project,
          start a local database, and verify connectivity before reporting
          success. Record the exact `chctl` commands used.
          EOF
        prompt: *neutral_prompt
    - id: installed-with-skills-chctl-nudge
      tag: installed-with-skills-chctl-nudge
      overrides:
        setup: *installed_skills_setup
        prompt: *chctl_nudge_prompt
model: claude-sonnet-4-6
tests:
  application:
    - name: report-exists
      script: |
        [ -s /workspace/report.json ]
    - name: report-schema
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        required = [
            "goal",
            "commands",
            "tools_installed",
            "tools_used",
            "install_attempted",
            "install_status",
            "install_evidence",
            "local_db_status",
            "connection_evidence",
            "outcome",
            "next_step",
        ]
        for key in required:
            if key not in report:
                raise SystemExit(f"missing {key}")
        if report["outcome"] not in {"success", "partial", "failed"}:
            raise SystemExit("invalid outcome")
        if not isinstance(report["install_attempted"], bool):
            raise SystemExit("install_attempted must be boolean")
        if report["install_status"] not in {"not-needed", "success", "partial", "failed", "not-attempted"}:
            raise SystemExit("invalid install_status")
        if report["local_db_status"] not in {"running", "created", "partial", "failed"}:
            raise SystemExit("invalid local_db_status")
        for key in ["commands", "tools_installed", "tools_used", "install_evidence", "connection_evidence"]:
            if not isinstance(report[key], list):
                raise SystemExit(f"{key} must be a list")
        PY
    - name: chctl-install-usage-classification-written
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        text = " ".join(
            str(item)
            for key in ["commands", "tools_installed", "tools_used", "install_evidence", "connection_evidence"]
            for item in report.get(key, [])
        ).lower()
        used_chctl = "chctl" in text or "clickhousectl" in text
        install_text = " ".join(str(item) for item in report.get("install_evidence", [])).lower()
        install_or_discovery = any(
            marker in text or marker in install_text
            for marker in ["curl", "brew", "npm", "apt", "install", "download", "clickhouse.com/cli"]
        )
        open("/workspace/chctl-install-usage-classification.txt", "w").write(
            "used_chctl=" + str(used_chctl).lower() + "\n"
            + "install_attempted=" + str(report.get("install_attempted")).lower() + "\n"
            + "install_status=" + str(report.get("install_status")) + "\n"
            + "install_or_discovery_evidence=" + str(install_or_discovery).lower() + "\n"
        )
        PY
    - name: local-db-evidence-present
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        if not report.get("connection_evidence"):
            raise SystemExit("missing connection evidence")
        PY
  introspection: []
limits:
  max_turns: 40
  max_time_seconds: 1200
  max_cost_usd: 1.50
