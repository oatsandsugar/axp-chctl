schema_version: 1
id: chctl-local-db
name: "Complete a local ClickHouse workflow across chctl discoverability variants"
flow:
  prompt: &neutral_prompt |
    You are helping Al at ClickHouse understand how an LLM completes a local
    ClickHouse workflow from scratch.

    A task brief is available at `/srv/chctl-local-db/README.md`.

    Complete this workflow for the `demo-app` project at
    `/srv/chctl-local-db/demo-app`:

    1. Initialize a project structure.
    2. Create a local database named `demo_app`.
    3. Create a table named `demo_app.events` for sample events.
    4. Seed at least three rows containing the event types `page_view`,
       `signup`, and `purchase`.
    5. Query `demo_app.events` and verify the seeded rows are present.

    Use whatever setup path and tools you think are appropriate. If required
    tooling is missing, discover and install what you need.

    Once you have successfully queried the seeded rows, stop working and end the
    session cleanly. The test harness will verify the database state and inspect
    the trace; do not write a separate summary report.
matrix:
  variant:
    - id: baseline
      tag: baseline
      overrides:
        setup: &base_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse workflow task

          Create a local ClickHouse workflow for a new project called demo-app.
          Initialize the project, create a database, create an events table,
          seed rows containing page_view, signup, and purchase, then query the
          seeded rows.
          EOF
        prompt: *neutral_prompt
    - id: install-hint
      tag: install-hint
      overrides:
        setup: *base_setup
        prompt: |
          You are helping Al at ClickHouse understand how an LLM completes a local
          ClickHouse workflow from scratch.

          A task brief is available at `/srv/chctl-local-db/README.md`.

          Complete this workflow for the `demo-app` project at
          `/srv/chctl-local-db/demo-app`:

          1. Initialize a project structure.
          2. Create a local database named `demo_app`.
          3. Create a table named `demo_app.events` for sample events.
          4. Seed at least three rows containing the event types `page_view`,
             `signup`, and `purchase`.
          5. Query `demo_app.events` and verify the seeded rows are present.

          Use whatever setup path and tools you think are appropriate. Local
          `chctl` may make this workflow easier; if you decide it is useful and
          it is not available, discover how to install it before continuing.

          Once you have successfully queried the seeded rows, stop working and
          end the session cleanly. The test harness will verify the database
          state and inspect the trace; do not write a separate summary report.
    - id: install-hint-docs-link
      tag: install-hint-docs-link
      overrides:
        setup: *base_setup
        prompt: |
          You are helping Al at ClickHouse understand how an LLM completes a local
          ClickHouse workflow from scratch.

          A task brief is available at `/srv/chctl-local-db/README.md`.

          Complete this workflow for the `demo-app` project at
          `/srv/chctl-local-db/demo-app`:

          1. Initialize a project structure.
          2. Create a local database named `demo_app`.
          3. Create a table named `demo_app.events` for sample events.
          4. Seed at least three rows containing the event types `page_view`,
             `signup`, and `purchase`.
          5. Query `demo_app.events` and verify the seeded rows are present.

          Use whatever setup path and tools you think are appropriate. Local
          `chctl` may make this workflow easier; if you decide it is useful and
          it is not available, discover how to install it before continuing. A
          potentially relevant ClickHouse CLI source is available at
          https://github.com/ClickHouse/clickhousectl.

          Once you have successfully queried the seeded rows, stop working and
          end the session cleanly. The test harness will verify the database
