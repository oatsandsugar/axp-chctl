schema_version: 1
id: chctl-local-db
name: "Stand up a local ClickHouse database across install, skills, and nudge variants"
flow:
  prompt: &neutral_prompt |
    You are helping Al at ClickHouse test whether an LLM can stand up a local
    ClickHouse database workflow.

    A task brief is available at `/srv/chctl-local-db/README.md`.

    Initialize or stand up a local ClickHouse database for the `demo-app`
    project using whatever setup path you think is appropriate. If you need a
    CLI or other tool that is not already available, discover and install it.
    Capture the commands you run, any install path you attempted, and the
    evidence that the local database is available. If the database cannot be
    started, explain exactly where it failed.

    When finished, write `/workspace/report.json` with this exact shape:
    {
      "goal": "stand up a local ClickHouse database",
      "commands": ["command 1", "command 2"],
      "tools_installed": ["tool names"],
      "tools_used": ["tool names"],
      "install_attempted": true,
      "install_status": "not-needed|success|partial|failed|not-attempted",
      "install_evidence": ["specific install command, output, or observation"],
      "local_db_status": "running|created|partial|failed",
      "connection_evidence": ["specific file, command output, port, or observation"],
      "outcome": "success|partial|failed",
      "next_step": "what a user should do next"
    }

    Do not omit `report.json`, even if the local database only partially works.
matrix:
  variant:
    - id: no-install-no-skills-no-nudge
      tag: no-install-no-skills-no-nudge
      overrides:
        setup: &base_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.
          EOF
    - id: no-install-no-skills-chctl-nudge
      tag: no-install-no-skills-chctl-nudge
      overrides:
        setup: *base_setup
        prompt: &chctl_nudge_prompt |
          You are helping Al at ClickHouse test whether an LLM can use `chctl`
          for a local database workflow.

          A task brief is available at `/srv/chctl-local-db/README.md`.

          Use `chctl` to initialize or stand up a local ClickHouse database for
          the `demo-app` project. If `chctl` is not already available, discover
          and install it as part of the task. Capture the commands you run, the
          install path you attempted, and the evidence that the local database
          is available. If the database cannot be started, explain exactly where
          it failed.

          When finished, write `/workspace/report.json` with this exact shape:
          {
            "goal": "stand up a local ClickHouse database",
            "commands": ["command 1", "command 2"],
            "tools_installed": ["tool names"],
            "tools_used": ["tool names"],
            "install_attempted": true,
            "install_status": "not-needed|success|partial|failed|not-attempted",
            "install_evidence": ["specific install command, output, or observation"],
            "local_db_status": "running|created|partial|failed",
            "connection_evidence": ["specific file, command output, port, or observation"],
            "outcome": "success|partial|failed",
            "next_step": "what a user should do next"
          }

          Do not omit `report.json`, even if the local database only partially works.
    - id: no-install-with-skills-no-nudge
      tag: no-install-with-skills-no-nudge
      overrides:
        setup: &skills_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          mkdir -p /srv/chctl-local-db/demo-app /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Workflow

          Use `chctl` as the primary interface for local ClickHouse project work.
          For local workflows, inspect `chctl --help`, initialize the project,
          start a local database, and verify connectivity before reporting
          success. Record the exact `chctl` commands used.
          EOF
        prompt: *neutral_prompt
    - id: no-install-with-skills-chctl-nudge
      tag: no-install-with-skills-chctl-nudge
      overrides:
        setup: *skills_setup
        prompt: *chctl_nudge_prompt
    - id: installed-no-skills-no-nudge
      tag: installed-no-skills-no-nudge
      overrides:
        setup: &installed_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-local-db/demo-app
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.

          Note: chctl is already installed in this environment.
          EOF
        prompt: *neutral_prompt
    - id: installed-no-skills-chctl-nudge
      tag: installed-no-skills-chctl-nudge
      overrides:
        setup: *installed_setup
        prompt: *chctl_nudge_prompt
    - id: installed-with-skills-no-nudge
      tag: installed-with-skills-no-nudge
      overrides:
        setup: &installed_skills_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl jq python3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/cli | sh
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p /srv/chctl-local-db/demo-app /root/.claude/skills/chctl-clickhouse
          cat > /srv/chctl-local-db/README.md <<'EOF'
          # Local ClickHouse database task

          Create or initialize a local ClickHouse database for a new project
          called demo-app. Use the setup path you think is appropriate. Record
          what happened in /workspace/report.json.

          Note: chctl is already installed in this environment.
          EOF
          cat > /root/.claude/skills/chctl-clickhouse/SKILL.md <<'EOF'
          ---
          name: chctl-clickhouse
          description: Use when working with chctl, CHC, local ClickHouse project setup, or ClickHouse Cloud handoff workflows.
          ---

          # chctl ClickHouse Workflow

          Use `chctl` as the primary interface for local ClickHouse project work.
          For local workflows, inspect `chctl --help`, initialize the project,
          start a local database, and verify connectivity before reporting
          success. Record the exact `chctl` commands used.
          EOF
        prompt: *neutral_prompt
    - id: installed-with-skills-chctl-nudge
      tag: installed-with-skills-chctl-nudge
      overrides:
        setup: *installed_skills_setup
        prompt: *chctl_nudge_prompt
model: claude-sonnet-4-6
tests:
  application:
    - name: report-exists
      script: |
        [ -s /workspace/report.json ]
    - name: report-schema
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        required = [
            "goal",
            "commands",
            "tools_installed",
            "tools_used",
            "install_attempted",
            "install_status",
            "install_evidence",
            "local_db_status",
            "connection_evidence",
            "outcome",
            "next_step",
        ]
        for key in required:
            if key not in report:
                raise SystemExit(f"missing {key}")
        if report["outcome"] not in {"success", "partial", "failed"}:
            raise SystemExit("invalid outcome")
        if not isinstance(report["install_attempted"], bool):
            raise SystemExit("install_attempted must be boolean")
        if report["install_status"] not in {"not-needed", "success", "partial", "failed", "not-attempted"}:
            raise SystemExit("invalid install_status")
        if report["local_db_status"] not in {"running", "created", "partial", "failed"}:
            raise SystemExit("invalid local_db_status")
        for key in ["commands", "tools_installed", "tools_used", "install_evidence", "connection_evidence"]:
            if not isinstance(report[key], list):
                raise SystemExit(f"{key} must be a list")
        PY
    - name: local-db-evidence-present
      script: |
        python3 - <<'PY'
        import json
        report = json.load(open("/workspace/report.json"))
        if not report.get("connection_evidence"):
            raise SystemExit("missing connection evidence")
        PY
  introspection:
    - name: trace-command-metrics-written
      script: |
        python3 - <<'PY'
        import json
        import os
        import re
        import shlex

        bash_commands = []
        bash_outputs = []
        tool_names = []
        agent_text = []
        skill_mentions = 0

        with open(os.environ["AXP_TRACE_PATH"]) as f:
            for line in f:
                if not line.strip():
                    continue
                event = json.loads(line)
                raw = event.get("raw_json", {})
                update = raw.get("params", {}).get("update", {})
                meta = update.get("_meta", {}).get("claudeCode", {})
                tool_name = meta.get("toolName")
                if isinstance(tool_name, str) and tool_name:
                    tool_names.append(tool_name)

                raw_input = update.get("rawInput")
                if tool_name == "Bash" and isinstance(raw_input, dict):
                    command = raw_input.get("command")
                    if isinstance(command, str):
                        bash_commands.append(command)

                tool_response = meta.get("toolResponse")
                if tool_name == "Bash" and isinstance(tool_response, dict):
                    for key in ["stdout", "stderr"]:
                        value = tool_response.get(key)
                        if isinstance(value, str) and value:
                            bash_outputs.append(value)

                for content_key in ["content"]:
                    content = update.get(content_key)
                    if isinstance(content, dict):
                        text = content.get("text")
                        if isinstance(text, str):
                            agent_text.append(text)
                            if "chctl-clickhouse" in text:
                                skill_mentions += 1

        def shell_words(command):
            try:
                return shlex.split(command)
            except ValueError:
                return command.split()

        def has_executable(command, names):
            words = shell_words(command)
            executables = []
            if words:
                executables.append(words[0])
            for sep in ["|", "&&", ";"]:
                parts = command.split(sep)
                for part in parts[1:]:
                    part_words = shell_words(part.strip())
                    if part_words:
                        executables.append(part_words[0])
            normalized = {word.rsplit("/", 1)[-1] for word in executables}
            return any(name in normalized for name in names)

        all_commands = "\n".join(bash_commands).lower()
        all_outputs = "\n".join(bash_outputs).lower()
        all_text = "\n".join(agent_text).lower()

        chctl_command_calls = sum(has_executable(command, {"chctl"}) for command in bash_commands)
        clickhousectl_command_calls = sum(has_executable(command, {"clickhousectl"}) for command in bash_commands)
        clickhouse_command_calls = sum(has_executable(command, {"clickhouse"}) for command in bash_commands)
        help_calls = sum(1 for command in bash_commands if "--help" in command or re.search(r"\bhelp\b", command))
        install_commands = sum(
            1 for command in bash_commands
            if any(marker in command.lower() for marker in ["install", "curl", "download", "clickhouse.com/cli", "clickhouse.com/install.sh"])
        )
        error_like_outputs = sum(
            1 for output in bash_outputs
            if any(marker in output for marker in ["error", "failed", "not found", "no such file", "permission denied", "cannot", "exit status"])
        )
        not_found_outputs = sum(
            1 for output in bash_outputs
            if "not found" in output or "no matches found" in output
        )
        scripting_executables = {"python", "python3", "node", "ruby", "perl", "awk", "sed", "jq"}
        shell_filter_tokens = ["| grep", "| awk", "| sed", "| jq", "| cut", "| tr", "| sort", "| head", "| tail"]
        generated_script_patterns = [
            r"cat\s+>\s+\S+\.(py|sh|js|mjs|ts)\b",
            r"tee\s+\S+\.(py|sh|js|mjs|ts)\b",
            r"python3?\s+-\s*<<",
            r"node\s+-\s*<<",
        ]
        scripting_command_calls = sum(has_executable(command, scripting_executables) for command in bash_commands)
        generated_script_commands = sum(
            1 for command in bash_commands
            if any(re.search(pattern, command) for pattern in generated_script_patterns)
        )
        output_filter_pipeline_commands = sum(
            1 for command in bash_commands
            if any(token in command.lower() for token in shell_filter_tokens)
        )
        clickhouse_filter_pipeline_commands = sum(
            1 for command in bash_commands
            if ("chctl" in command.lower() or "clickhouse" in command.lower())
            and any(token in command.lower() for token in shell_filter_tokens)
        )
        scripted_clickhouse_control_commands = sum(
            1 for command in bash_commands
            if has_executable(command, {"python", "python3", "node"})
            and ("chctl" in command.lower() or "clickhouse" in command.lower())
        )
        possible_fake_feature_commands = sum(
            1 for command in bash_commands
            if ("chctl" in command.lower() or "clickhouse" in command.lower())
            and any(token in command.lower() for token in ["awk", "sed", "jq", "python", "node", "grep"])
        )

        def count_tool(name):
            return sum(1 for tool_name in tool_names if tool_name == name)

        metrics = {
            "total_tool_calls": len(tool_names),
            "bash_tool_calls": count_tool("Bash"),
            "read_tool_calls": count_tool("Read"),
            "web_search_tool_calls": count_tool("WebSearch"),
            "agent_tool_calls": count_tool("Agent"),
            "chctl_command_calls": chctl_command_calls,
            "clickhousectl_command_calls": clickhousectl_command_calls,
            "clickhouse_command_calls": clickhouse_command_calls,
            "help_calls": help_calls,
            "install_commands": install_commands,
            "error_like_outputs": error_like_outputs,
            "not_found_outputs": not_found_outputs,
            "scripting_command_calls": scripting_command_calls,
            "generated_script_commands": generated_script_commands,
            "output_filter_pipeline_commands": output_filter_pipeline_commands,
            "clickhouse_filter_pipeline_commands": clickhouse_filter_pipeline_commands,
            "scripted_clickhouse_control_commands": scripted_clickhouse_control_commands,
            "possible_fake_feature_commands": possible_fake_feature_commands,
            "used_chctl_skill": skill_mentions > 0,
            "mentioned_chctl_in_agent_text": "chctl" in all_text,
            "mentioned_clickhousectl_in_agent_text": "clickhousectl" in all_text,
            "commands": bash_commands,
        }

        with open("/workspace/trace-command-metrics.json", "w") as out:
            json.dump(metrics, out, indent=2, sort_keys=True)

        with open("/workspace/chctl-install-usage-classification.txt", "w") as out:
            out.write(f"chctl_command_calls={chctl_command_calls}\n")
            out.write(f"clickhousectl_command_calls={clickhousectl_command_calls}\n")
            out.write(f"clickhouse_command_calls={clickhouse_command_calls}\n")
            out.write(f"help_calls={help_calls}\n")
            out.write(f"install_commands={install_commands}\n")
            out.write(f"error_like_outputs={error_like_outputs}\n")
            out.write(f"not_found_outputs={not_found_outputs}\n")
            out.write(f"scripting_command_calls={scripting_command_calls}\n")
            out.write(f"generated_script_commands={generated_script_commands}\n")
            out.write(f"output_filter_pipeline_commands={output_filter_pipeline_commands}\n")
            out.write(f"clickhouse_filter_pipeline_commands={clickhouse_filter_pipeline_commands}\n")
            out.write(f"scripted_clickhouse_control_commands={scripted_clickhouse_control_commands}\n")
            out.write(f"possible_fake_feature_commands={possible_fake_feature_commands}\n")
            out.write(f"used_chctl_skill={str(skill_mentions > 0).lower()}\n")
        PY
limits:
  max_turns: 40
  max_time_seconds: 1200
  max_cost_usd: 1.50
