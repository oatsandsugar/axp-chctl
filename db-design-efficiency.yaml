                  conn.executemany("INSERT INTO dim_product VALUES (?, ?, ?, ?, ?, ?, ?)", [(i, p["product_id"], p["category"], p["subcategory"], p["supplier_tier"], p["list_price_cents"], p["unit_cost_cents"]) for i, p in enumerate(products, start=1)])
