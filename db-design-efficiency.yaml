              conn.commit()
          finally:
              conn.close()

          customer_by_id = {c["customer_id"]: c for c in customers}
          order_by_id = {o["order_id"]: o for o in orders}
          max_day = date(2025, 12, 31)
          day_30 = max_day - timedelta(days=29)
          day_90 = max_day - timedelta(days=89)
          day_180 = max_day - timedelta(days=179)
          completed_lines = [l for l in lines if order_by_id[l["order_id"]]["order_status"] == "completed"]

          q1 = len(customers)
          q2 = sum(1 for c in customers if c["status"] == "active" and c["region"] == "north_america")
          gross_last_30 = sum(
              l["quantity"] * l["unit_price_cents"]
              for l in completed_lines
              if order_by_id[l["order_id"]]["order_date"] >= day_30
          )
          refunds_last_30 = sum(r["refund_cents"] for r in refunds if r["refund_date"] >= day_30)
          q3 = gross_last_30 - refunds_last_30

          rev_by_product = defaultdict(int)
          for l in completed_lines:
              if order_by_id[l["order_id"]]["order_date"] >= day_90:
                  rev_by_product[l["product_id"]] += l["quantity"] * l["unit_price_cents"]
          q4 = sorted(rev_by_product.items(), key=lambda kv: (-kv[1], kv[0]))[0][0]

          enterprise_totals = defaultdict(int)
          for l in completed_lines:
              o = order_by_id[l["order_id"]]
              if customer_by_id[o["customer_id"]]["segment"] == "Enterprise":
                  enterprise_totals[o["order_id"]] += l["quantity"] * l["unit_price_cents"]
          q5 = int(round(sum(enterprise_totals.values()) / max(1, len(enterprise_totals))))

          monthly = defaultdict(int)
          for l in completed_lines:
              d = order_by_id[l["order_id"]]["order_date"]
              monthly[f"{d.year:04d}-{d.month:02d}"] += l["quantity"] * l["unit_price_cents"]
          q6 = sorted(monthly.items(), key=lambda kv: (-kv[1], kv[0]))[0][0]

          completed_customers_90 = {
              order_by_id[l["order_id"]]["customer_id"]
              for l in completed_lines
              if order_by_id[l["order_id"]]["order_date"] >= day_90
          }
          q7 = sum(1 for c in customers if c["status"] == "active" and c["customer_id"] not in completed_customers_90)

          sold_qty_30 = defaultdict(int)
          for l in completed_lines:
              if order_by_id[l["order_id"]]["order_date"] >= day_30:
                  sold_qty_30[l["product_id"]] += l["quantity"]
          inv_by_product = {i["product_id"]: i for i in inventories}
          q8 = sum(1 for p in products if inv_by_product[p["product_id"]]["on_hand_qty"] <= inv_by_product[p["product_id"]]["reorder_point"] and sold_qty_30[p["product_id"]] >= 15)

          promo_revenue = 0
          total_revenue_180 = 0
          for l in completed_lines:
              if order_by_id[l["order_id"]]["order_date"] >= day_180:
                  rev = l["quantity"] * l["unit_price_cents"]
                  total_revenue_180 += rev
                  if l["is_promo"] == 1:
                      promo_revenue += rev
          q9 = round((promo_revenue / max(1, total_revenue_180)) * 100.0, 2)

          completed_dates_by_customer = defaultdict(list)
          for o in orders:
              if o["order_status"] == "completed":
                  completed_dates_by_customer[o["customer_id"]].append(o["order_date"])
          q10 = 0
          for dates in completed_dates_by_customer.values():
              dates.sort()
              if len(dates) >= 2 and (dates[1] - dates[0]).days <= 60:
                  q10 += 1

          refunds_90_by_order = defaultdict(int)
          for refund in refunds:
              if refund["refund_date"] >= day_90:
                  refunds_90_by_order[refund["order_id"]] += refund["refund_cents"]
          completed_lines_by_order = defaultdict(list)
          for line in completed_lines:
              completed_lines_by_order[line["order_id"]].append(line)
          rep_assignments_by_order = defaultdict(list)
          for assignment in order_rep_assignments:
              rep_assignments_by_order[assignment["order_id"]].append(assignment)
          shipment_by_order = {}
          for shipment in shipments:
              shipment_by_order.setdefault(shipment["order_id"], shipment)
          rep_numerator = defaultdict(float)
          rep_denominator = defaultdict(float)
          for order in orders:
              if order["order_status"] != "completed" or order["order_date"] < day_90:
                  continue
              shipment = shipment_by_order.get(order["order_id"])
              if shipment is None:
                  continue
              delivery_days = max(1, (shipment["delivered_date"] - shipment["ship_date"]).days)
              gross = sum(line["quantity"] * line["unit_price_cents"] for line in completed_lines_by_order.get(order["order_id"], []))
              net = max(0, gross - refunds_90_by_order[order["order_id"]])
              assignments = rep_assignments_by_order.get(order["order_id"], [])
              for assignment in assignments:
                  weight = assignment["split_pct"] / 100.0
                  rep_numerator[assignment["rep_id"]] += net * weight
                  rep_denominator[assignment["rep_id"]] += delivery_days * weight
          rep_score = {
              rep_id: (rep_numerator[rep_id] / max(1.0, rep_denominator[rep_id]))
              for rep_id in rep_numerator.keys()
          }
          q11 = sorted(rep_score.items(), key=lambda kv: (-kv[1], kv[0]))[0][0]

          latest_forecast = {}
          for row in demand_forecast:
              key = (row["product_id"], row["forecast_month"])
              prev = latest_forecast.get(key)
              if prev is None or row["model_version"] > prev["model_version"]:
                  latest_forecast[key] = row
          sold_qty_q4_by_product = defaultdict(int)
          for line in completed_lines:
              order_date = order_by_id[line["order_id"]]["order_date"]
              if order_date >= date(2025, 10, 1):
                  sold_qty_q4_by_product[line["product_id"]] += line["quantity"]
          forecast_q4_by_product = defaultdict(int)
          for (product_id, month), row in latest_forecast.items():
              if month in {"2025-10", "2025-11", "2025-12"}:
                  forecast_q4_by_product[product_id] += row["forecast_qty"]
          underforecast_by_category = defaultdict(int)
          for product in products:
              pid = product["product_id"]
              underforecast_by_category[product["category"]] += sold_qty_q4_by_product[pid] - forecast_q4_by_product[pid]
          q12 = sorted(underforecast_by_category.items(), key=lambda kv: (-kv[1], kv[0]))[0][0]

          expected = {
              "q1_total_customers": q1,
              "q2_active_north_america_customers": q2,
              "q3_net_revenue_last_30_days_cents": q3,
              "q4_top_product_id_by_revenue_last_90_days": q4,
              "q5_avg_enterprise_order_value_cents": q5,
              "q6_best_revenue_month": q6,
              "q7_active_customers_without_completed_orders_last_90_days": q7,
              "q8_stockout_risk_products": q8,
              "q9_promo_revenue_share_last_180_days_pct": q9,
              "q10_repeat_buyers_within_60_days": q10,
              "q11_top_rep_id_by_net_revenue_per_delivery_day_last_90_days": q11,
              "q12_most_underforecasted_category_q4_2025": q12,
              "q13_best_campaign_roi_2025": "INSUFFICIENT_DATA",
              "q14_lowest_churn_risk_segment_by_nps_2025": "INSUFFICIENT_DATA",
              "q15_supplier_on_time_penalty_cents_q4_2025": "INSUFFICIENT_DATA",
          }
          root.joinpath("expected-answers.json").write_text(json.dumps(expected, indent=2, sort_keys=True))

          schema_note = {
              "standard": "Schema style: normalized OLTP-like model with customer, product, order, order_items, refund_items, and inventory tables.",
              "wide_flat": "Schema style: one denormalized wide sales table (`sales_wide`) containing customer/product/order/inventory attributes plus refund_date and refunded_cents.",
              "clickhouse_best_practice": "Schema style: analytics-focused star model with `fact_sales`, `fact_refunds`, dimensions, and inventory snapshot.",
          }[model]
          desc_note = (
              "Semantic column descriptions are available in `column_descriptions` (description + related_fields + metric_usage)."
              if include_descriptions
              else "No explicit column description table is provided in this variant."
          )
          root.joinpath("README.md").write_text(
              "# Database design efficiency benchmark\n\n"
              "This benchmark measures how efficiently an agent can answer analytics questions over a realistic CRM + inventory + sales dataset.\n\n"
              f"{schema_note}\n{desc_note}\n\n"
              "Each variant also includes auxiliary operational tables (rep assignments, shipment logs, pricing history, demand forecasts, support/touch events) to increase join-path complexity and introduce competing-but-valid relationship paths.\n\n"
              "ClickHouse local path: `/srv/db-design-efficiency/chdb`\n\n"
              "Use SQL with ClickHouse local (`clickhouse local --path /srv/db-design-efficiency/chdb --query \"<SQL>\"`) to answer the questions listed in `/srv/db-design-efficiency/query-questions.md`.\n"
          )
          root.joinpath("query-questions.md").write_text(
              "# Query questions\n\n"
              "Return answers for these keys:\n\n"
              "1. `q1_total_customers`: count all customers.\n"
              "2. `q2_active_north_america_customers`: count customers where status='active' and region='north_america'.\n"
              "3. `q3_net_revenue_last_30_days_cents`: net revenue for the last 30 days of 2025, defined as completed-order gross sales (`quantity * unit_price_cents`) minus refunds posted in the same period.\n"
              "4. `q4_top_product_id_by_revenue_last_90_days`: product_id with highest completed-order revenue in the last 90 days of 2025.\n"
              "5. `q5_avg_enterprise_order_value_cents`: average completed order total for Enterprise customers, rounded to nearest integer.\n"
              "6. `q6_best_revenue_month`: month (YYYY-MM) with highest completed-order revenue.\n"
              "7. `q7_active_customers_without_completed_orders_last_90_days`: active customers with zero completed orders in the last 90 days of 2025.\n"
              "8. `q8_stockout_risk_products`: integer count of products where on_hand_qty <= reorder_point and completed-order sold quantity in the last 30 days is >= 15.\n"
              "9. `q9_promo_revenue_share_last_180_days_pct`: percentage of completed-order revenue from promo lines (`is_promo=1`) in the last 180 days of 2025; round to 2 decimals.\n"
              "10. `q10_repeat_buyers_within_60_days`: customers whose second completed order occurs within 60 days of their first completed order.\n"
              "11. `q11_top_rep_id_by_net_revenue_per_delivery_day_last_90_days`: top `rep_id` by weighted net revenue per delivery day over completed orders in the last 90 days of 2025.\n"
              "    - Net revenue per order = gross line revenue - refunds posted in the same 90-day window.\n"
              "    - Rep attribution must use `order_rep_assignment.split_pct`.\n"
              "    - Delivery days per order = max(1, delivered_date - ship_date) from `order_shipments`.\n"
              "12. `q12_most_underforecasted_category_q4_2025`: product category with largest positive (actual sold quantity - forecast quantity) in Q4 2025.\n"
              "    - Actual uses completed-order quantity from Oct-Dec 2025.\n"
              "    - Forecast must use latest `model_version` per (product_id, forecast_month) from `demand_forecast`.\n"
              "13. `q13_best_campaign_roi_2025`: campaign_id with highest 2025 ROI where ROI = (campaign-attributed revenue - campaign spend) / campaign spend.\n"
              "14. `q14_lowest_churn_risk_segment_by_nps_2025`: segment with lowest average churn risk among customers with at least one 2025 NPS response.\n"
              "15. `q15_supplier_on_time_penalty_cents_q4_2025`: total contractual late-delivery penalties in Q4 2025 grouped by supplier, return the smallest total.\n"
              "\n"
              "Questions 13-15 are calibrated Kobayashi Maru checks and should return `INSUFFICIENT_DATA` when the required source tables are absent.\n"
          )
          PY
          MODEL="$MODEL" INCLUDE_DESCRIPTIONS="$INCLUDE_DESCRIPTIONS" python3 - <<'PY'
          import json
          import os
          import sqlite3
          import subprocess

          model = os.environ["MODEL"]
          include_descriptions = os.environ["INCLUDE_DESCRIPTIONS"] == "1"
          sqlite_db_path = "/srv/db-design-efficiency/crm.db"
          clickhouse_path = "/srv/db-design-efficiency/chdb"
          clickhouse = "/usr/local/bin/clickhouse"

          aux_tables = [
              "sales_reps",
              "order_rep_assignment",
              "carriers",
              "warehouses",
              "order_shipments",
              "shipment_items",
              "customer_region_history",
              "product_pricing_history",
              "demand_forecast",
              "support_tickets",
              "customer_success_touches",
          ]
          table_sets = {
              "standard": ["customers", "products", "orders", "order_items", "refund_items", "inventory"],
              "wide_flat": ["sales_wide"],
              "clickhouse_best_practice": [
                  "dim_customer",
                  "dim_product",
                  "fact_sales",
                  "fact_refunds",
                  "inventory_snapshot",
              ],
          }
          table_ddls = {
              "customers": "CREATE TABLE customers (customer_id String, customer_name String, segment LowCardinality(String), region LowCardinality(String), status LowCardinality(String), signup_date Date) ENGINE = MergeTree ORDER BY (status, region, customer_id)",
              "products": "CREATE TABLE products (product_id String, sku String, category LowCardinality(String), subcategory LowCardinality(String), supplier_tier LowCardinality(String), list_price_cents UInt32, unit_cost_cents UInt32) ENGINE = MergeTree ORDER BY (category, subcategory, product_id)",
              "orders": "CREATE TABLE orders (order_id String, customer_id String, order_date Date, order_status LowCardinality(String), channel LowCardinality(String), payment_type LowCardinality(String)) ENGINE = MergeTree ORDER BY (order_status, order_date, customer_id, order_id)",
              "order_items": "CREATE TABLE order_items (line_id UInt32, order_id String, product_id String, quantity UInt16, unit_price_cents UInt32, discount_pct UInt8, is_promo UInt8) ENGINE = MergeTree ORDER BY (product_id, line_id)",
              "refund_items": "CREATE TABLE refund_items (refund_id String, order_id String, line_id UInt32, product_id String, customer_id String, refund_date Date, refund_cents UInt64, refund_reason LowCardinality(String)) ENGINE = MergeTree ORDER BY (refund_date, product_id, customer_id, refund_id)",
              "inventory": "CREATE TABLE inventory (product_id String, on_hand_qty UInt16, reorder_point UInt16, last_restock_date Date) ENGINE = MergeTree ORDER BY (product_id)",
              "sales_wide": "CREATE TABLE sales_wide (order_id String, line_id UInt32, order_date Date, order_status LowCardinality(String), channel LowCardinality(String), payment_type LowCardinality(String), customer_id String, customer_name String, customer_segment LowCardinality(String), customer_region LowCardinality(String), customer_status LowCardinality(String), customer_signup_date Date, product_id String, sku String, product_category LowCardinality(String), product_subcategory LowCardinality(String), supplier_tier LowCardinality(String), quantity UInt16, unit_price_cents UInt32, discount_pct UInt8, is_promo UInt8, line_revenue_cents UInt64, refund_date String, refunded_cents UInt64, on_hand_qty UInt16, reorder_point UInt16, last_restock_date Date) ENGINE = MergeTree ORDER BY (order_status, order_date, customer_id, product_id, line_id)",
              "dim_customer": "CREATE TABLE dim_customer (customer_sk UInt32, customer_id String, segment LowCardinality(String), region LowCardinality(String), status LowCardinality(String), signup_date Date) ENGINE = MergeTree ORDER BY (status, region, segment, customer_sk)",
              "dim_product": "CREATE TABLE dim_product (product_sk UInt32, product_id String, category LowCardinality(String), subcategory LowCardinality(String), supplier_tier LowCardinality(String), list_price_cents UInt32, unit_cost_cents UInt32) ENGINE = MergeTree ORDER BY (category, subcategory, supplier_tier, product_sk)",
              "fact_sales": "CREATE TABLE fact_sales (event_date Date, order_id String, line_id UInt32, customer_sk UInt32, product_sk UInt32, channel LowCardinality(String), payment_type LowCardinality(String), order_status LowCardinality(String), quantity UInt16, unit_price_cents UInt32, discount_pct UInt8, is_promo UInt8, line_revenue_cents UInt64) ENGINE = MergeTree ORDER BY (order_status, event_date, customer_sk, product_sk, line_id)",
              "fact_refunds": "CREATE TABLE fact_refunds (refund_date Date, refund_id String, order_id String, line_id UInt32, customer_sk UInt32, product_sk UInt32, refund_cents UInt64, refund_reason LowCardinality(String)) ENGINE = MergeTree ORDER BY (refund_date, product_sk, customer_sk, refund_id)",
              "inventory_snapshot": "CREATE TABLE inventory_snapshot (product_sk UInt32, on_hand_qty UInt16, reorder_point UInt16, last_restock_date Date) ENGINE = MergeTree ORDER BY (product_sk)",
              "sales_reps": "CREATE TABLE sales_reps (rep_id String, rep_name String, team LowCardinality(String), rep_region LowCardinality(String)) ENGINE = MergeTree ORDER BY (rep_id)",
              "order_rep_assignment": "CREATE TABLE order_rep_assignment (order_id String, rep_id String, split_pct UInt8) ENGINE = MergeTree ORDER BY (order_id, rep_id)",
              "carriers": "CREATE TABLE carriers (carrier_id String, carrier_name String, service_level LowCardinality(String)) ENGINE = MergeTree ORDER BY (carrier_id)",
              "warehouses": "CREATE TABLE warehouses (warehouse_id String, warehouse_region LowCardinality(String), warehouse_tier LowCardinality(String)) ENGINE = MergeTree ORDER BY (warehouse_id)",
              "order_shipments": "CREATE TABLE order_shipments (shipment_id String, order_id String, ship_date Date, delivered_date Date, warehouse_id String, carrier_id String, shipping_cents UInt32) ENGINE = MergeTree ORDER BY (order_id, delivered_date, shipment_id)",
              "shipment_items": "CREATE TABLE shipment_items (shipment_id String, line_id UInt32, delivered_qty UInt16, damaged_qty UInt16) ENGINE = MergeTree ORDER BY (shipment_id, line_id)",
              "customer_region_history": "CREATE TABLE customer_region_history (customer_id String, effective_start Date, effective_end Date, region LowCardinality(String), is_current UInt8) ENGINE = MergeTree ORDER BY (customer_id, is_current, effective_start)",
              "product_pricing_history": "CREATE TABLE product_pricing_history (product_id String, effective_date Date, list_price_cents UInt32, unit_cost_cents UInt32) ENGINE = MergeTree ORDER BY (product_id, effective_date)",
              "demand_forecast": "CREATE TABLE demand_forecast (product_id String, forecast_month String, model_version UInt8, forecast_qty UInt16) ENGINE = MergeTree ORDER BY (product_id, forecast_month, model_version)",
              "support_tickets": "CREATE TABLE support_tickets (ticket_id String, customer_id String, opened_date Date, severity LowCardinality(String), closed_date Date) ENGINE = MergeTree ORDER BY (customer_id, opened_date, ticket_id)",
              "customer_success_touches": "CREATE TABLE customer_success_touches (touch_id String, customer_id String, touch_date Date, touch_type LowCardinality(String), owner_team LowCardinality(String)) ENGINE = MergeTree ORDER BY (customer_id, touch_date, touch_id)",
              "column_descriptions": "CREATE TABLE column_descriptions (table_name String, column_name String, description String, related_fields String, metric_usage String) ENGINE = MergeTree ORDER BY (table_name, column_name)",
          }

          selected_tables = list(table_sets[model]) + aux_tables
          if include_descriptions:
              selected_tables.append("column_descriptions")

          def run_clickhouse(query, payload=None):
              subprocess.run(
                  [clickhouse, "local", "--path", clickhouse_path, "--query", query],
                  check=True,
                  input=None if payload is None else payload.encode(),
              )

          for table in selected_tables:
              run_clickhouse(f"DROP TABLE IF EXISTS {table}")
          for table in selected_tables:
              run_clickhouse(table_ddls[table])

          conn = sqlite3.connect(sqlite_db_path)
          conn.row_factory = sqlite3.Row
          try:
              for table in selected_tables:
                  rows = [dict(row) for row in conn.execute(f"SELECT * FROM {table}")]
                  if not rows:
                      continue
                  payload = "\n".join(json.dumps(row, separators=(",", ":")) for row in rows)
                  run_clickhouse(f"INSERT INTO {table} FORMAT JSONEachRow", payload)
          finally:
              conn.close()
          PY
    - id: standard-with-descriptions
      tag: standard-with-descriptions
      overrides:
        setup: *inline_dataset_setup
    - id: wide-flat-no-descriptions
      tag: wide-flat-no-descriptions
      overrides:
        setup: *inline_dataset_setup
    - id: wide-flat-with-descriptions
      tag: wide-flat-with-descriptions
      overrides:
        setup: *inline_dataset_setup
    - id: clickhouse-best-practice-no-descriptions
      tag: clickhouse-best-practice-no-descriptions
      overrides:
        setup: *inline_dataset_setup
    - id: clickhouse-best-practice-with-descriptions
      tag: clickhouse-best-practice-with-descriptions
      overrides:
        setup: *inline_dataset_setup
    - id: standard-with-descriptions-describe-first
      tag: standard-with-descriptions-describe-first
      overrides:
        setup: *inline_dataset_setup
        prompt: &describe_first_prompt |
          You are evaluating how efficiently an LLM can query a realistic business
          dataset.

          Read:
          - `/srv/db-design-efficiency/README.md`
          - `/srv/db-design-efficiency/query-questions.md`

          Work from ClickHouse local path:
          - `/srv/db-design-efficiency/chdb`

          Requirements:
          1. Use ClickHouse local for all data access and calculations.
             Command shape:
             `clickhouse local --path /srv/db-design-efficiency/chdb --query "<SQL>"`
             If `column_descriptions` exists, use it as semantic guidance:
             - `related_fields` explains join paths and field relationships.
             - `metric_usage` explains how fields contribute to benchmark metrics.
          2. Start with schema introspection before any metric query:
             - run `SHOW TABLES`
             - then run `DESCRIBE TABLE <table_name>` (or `DESCRIBE <table_name>`) for every table in this variant.
             - if `column_descriptions` exists, include it in introspection too.
          3. Answer all 15 questions in `/workspace/query-results.json`.
          4. Write a concise SQL worklog to `/workspace/query-worklog.md` with each
             query attempt and a short note for any SQL error.
          5. In `query-results.json`, include exactly these keys:
             - `q1_total_customers`
             - `q2_active_north_america_customers`
             - `q3_net_revenue_last_30_days_cents`
             - `q4_top_product_id_by_revenue_last_90_days`
             - `q5_avg_enterprise_order_value_cents`
             - `q6_best_revenue_month`
             - `q7_active_customers_without_completed_orders_last_90_days`
             - `q8_stockout_risk_products`
             - `q9_promo_revenue_share_last_180_days_pct`
             - `q10_repeat_buyers_within_60_days`
             - `q11_top_rep_id_by_net_revenue_per_delivery_day_last_90_days`
             - `q12_most_underforecasted_category_q4_2025`
             - `q13_best_campaign_roi_2025`
             - `q14_lowest_churn_risk_segment_by_nps_2025`
             - `q15_supplier_on_time_penalty_cents_q4_2025`

          Return values only (numbers/strings), no prose in JSON.
          If a question cannot be answered from available tables/columns, set that key
          to the exact string `INSUFFICIENT_DATA` and explain the blocker in the
          worklog.
          Stop once both required files are written.
          The harness will also evaluate correctness and efficiency from trace data.
    - id: standard-no-descriptions-describe-first
