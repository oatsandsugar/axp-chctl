# yaml-language-server: $schema=https://docs.514.ai/schema/scenario.v1.schema.yaml
schema_version: 1
id: db-design-efficiency
name: "Measure LLM SQL efficiency across schema designs"
description: |
  Compares how efficiently an agent answers analytics questions across twelve
  scenario variants built from the same CRM + inventory + sales dataset:
  normalized, wide flat, and ClickHouse-inspired analytics model; each with
  and without descriptive column metadata, plus describe-first prompt variants.
flow:
  prompt: &default_prompt |
    You are evaluating how efficiently an LLM can query a realistic business
    dataset.

    Read:
    - `/srv/db-design-efficiency/README.md`
    - `/srv/db-design-efficiency/query-questions.md`

    Work from ClickHouse local path:
    - `/srv/db-design-efficiency/chdb`

    Requirements:
    1. Use ClickHouse local for all data access and calculations.
       Command shape:
       `clickhouse local --path /srv/db-design-efficiency/chdb --query "<SQL>"`
       If `column_descriptions` exists, use it as semantic guidance:
       - `related_fields` explains join paths and field relationships.
       - `metric_usage` explains how fields contribute to benchmark metrics.
    2. Answer all 15 questions in `/workspace/query-results.json`.
    3. Write a concise SQL worklog to `/workspace/query-worklog.md` with each
       query attempt and a short note for any SQL error.
    4. In `query-results.json`, include exactly these keys:
       - `q1_total_customers`
       - `q2_active_north_america_customers`
       - `q3_net_revenue_last_30_days_cents`
       - `q4_top_product_id_by_revenue_last_90_days`
       - `q5_avg_enterprise_order_value_cents`
       - `q6_best_revenue_month`
       - `q7_active_customers_without_completed_orders_last_90_days`
       - `q8_stockout_risk_products`
       - `q9_promo_revenue_share_last_180_days_pct`
       - `q10_repeat_buyers_within_60_days`
       - `q11_top_rep_id_by_net_revenue_per_delivery_day_last_90_days`
       - `q12_most_underforecasted_category_q4_2025`
       - `q13_best_campaign_roi_2025`
       - `q14_lowest_churn_risk_segment_by_nps_2025`
       - `q15_supplier_on_time_penalty_cents_q4_2025`

    Return values only (numbers/strings), no prose in JSON.
    If a question cannot be answered from available tables/columns, set that key
    to the exact string `INSUFFICIENT_DATA` and explain the blocker in the
    worklog.
    Stop once both required files are written.
    The harness will also evaluate correctness and efficiency from trace data.
matrix:
  variant:
    - id: standard-no-descriptions
      tag: standard-no-descriptions
      overrides:
        setup: &inline_dataset_setup |
          set -euxo pipefail
          apt-get update >/dev/null
          apt-get install -y --no-install-recommends ca-certificates curl python3 sqlite3 >/dev/null
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://clickhouse.com/ | sh
          install -m 0755 clickhouse /usr/local/bin/clickhouse
          case "${AXP_VARIANT_ID:-}" in
            standard-no-descriptions) MODEL=standard; INCLUDE_DESCRIPTIONS=0 ;;
            standard-with-descriptions) MODEL=standard; INCLUDE_DESCRIPTIONS=1 ;;
            standard-with-descriptions-describe-first) MODEL=standard; INCLUDE_DESCRIPTIONS=1 ;;
            standard-no-descriptions-describe-first) MODEL=standard; INCLUDE_DESCRIPTIONS=0 ;;
            wide-flat-no-descriptions) MODEL=wide_flat; INCLUDE_DESCRIPTIONS=0 ;;
            wide-flat-with-descriptions) MODEL=wide_flat; INCLUDE_DESCRIPTIONS=1 ;;
            wide-flat-with-descriptions-describe-first) MODEL=wide_flat; INCLUDE_DESCRIPTIONS=1 ;;
            wide-flat-no-descriptions-describe-first) MODEL=wide_flat; INCLUDE_DESCRIPTIONS=0 ;;
            clickhouse-best-practice-no-descriptions) MODEL=clickhouse_best_practice; INCLUDE_DESCRIPTIONS=0 ;;
            clickhouse-best-practice-with-descriptions) MODEL=clickhouse_best_practice; INCLUDE_DESCRIPTIONS=1 ;;
            clickhouse-best-practice-with-descriptions-describe-first) MODEL=clickhouse_best_practice; INCLUDE_DESCRIPTIONS=1 ;;
            clickhouse-best-practice-no-descriptions-describe-first) MODEL=clickhouse_best_practice; INCLUDE_DESCRIPTIONS=0 ;;
            *)
              echo "Unknown AXP_VARIANT_ID: ${AXP_VARIANT_ID:-<unset>}" >&2
              exit 2
              ;;
          esac
          MODEL="$MODEL" INCLUDE_DESCRIPTIONS="$INCLUDE_DESCRIPTIONS" python3 - <<'PY'
          import json
          import os
          import random
          import sqlite3
          from collections import defaultdict
          from datetime import date, timedelta
          from pathlib import Path

          model = os.environ["MODEL"]
          include_descriptions = os.environ["INCLUDE_DESCRIPTIONS"] == "1"
          rng = random.Random(51442)

          root = Path("/srv/db-design-efficiency")
          root.mkdir(parents=True, exist_ok=True)
          db_path = root / "crm.db"
          if db_path.exists():
              db_path.unlink()

          def pick_weighted(options):
              vals = [v for v, _ in options]
              weights = [w for _, w in options]
              return rng.choices(vals, weights=weights, k=1)[0]

          def random_date(start, end):
              return start + timedelta(days=rng.randint(0, (end - start).days))

          customers = []
          segments = [("SMB", 0.5), ("Mid-Market", 0.3), ("Enterprise", 0.2)]
          regions = [("north_america", 0.36), ("europe", 0.28), ("asia_pacific", 0.24), ("latin_america", 0.12)]
          statuses = [("active", 0.86), ("trial", 0.07), ("churned", 0.07)]
          for idx in range(1, 241):
              customers.append(
                  {
                      "customer_id": f"C{idx:04d}",
                      "customer_name": f"Customer {idx:04d}",
                      "segment": pick_weighted(segments),
                      "region": pick_weighted(regions),
                      "status": pick_weighted(statuses),
                      "signup_date": random_date(date(2023, 1, 1), date(2025, 6, 30)),
                  }
              )

          categories = {
              "hardware": ["edge_gateway", "scanner", "sensor", "tablet"],
              "software": ["analytics_suite", "crm_module", "billing_extension", "forecast_engine"],
              "accessories": ["mount_kit", "dock", "power_supply", "spare_cable"],
              "services": ["onboarding", "priority_support", "training", "data_migration"],
          }
          products = []
          product_idx = 1
          for category, subs in categories.items():
              for sub in subs:
                  for _ in range(8):
                      list_price = rng.randint(3500, 65000)
                      margin = rng.uniform(0.22, 0.48)
                      products.append(
                          {
                              "product_id": f"P{product_idx:04d}",
                              "sku": f"{category[:3].upper()}-{sub[:3].upper()}-{product_idx:04d}",
                              "category": category,
                              "subcategory": sub,
                              "supplier_tier": pick_weighted([("tier_1", 0.4), ("tier_2", 0.4), ("tier_3", 0.2)]),
                              "list_price_cents": list_price,
                              "unit_cost_cents": int(list_price * (1 - margin)),
                          }
                      )
                      product_idx += 1

          customer_ids = [c["customer_id"] for c in customers]
          customer_weights = [1.7 if c["status"] == "active" else 0.6 for c in customers]
          orders = []
          lines = []
          line_id = 1
          for order_num in range(1, 3001):
              customer_id = rng.choices(customer_ids, weights=customer_weights, k=1)[0]
              order = {
                  "order_id": f"O{order_num:05d}",
                  "customer_id": customer_id,
                  "order_date": random_date(date(2025, 1, 1), date(2025, 12, 31)),
                  "order_status": pick_weighted([("completed", 0.88), ("returned", 0.07), ("cancelled", 0.05)]),
                  "channel": pick_weighted([("online", 0.58), ("sales_rep", 0.27), ("partner", 0.15)]),
                  "payment_type": pick_weighted([("card", 0.46), ("invoice", 0.44), ("wire", 0.10)]),
              }
              orders.append(order)
              for _ in range(rng.randint(2, 5)):
                  product = products[rng.randrange(len(products))]
                  discount_pct = pick_weighted([(0, 0.4), (5, 0.2), (10, 0.2), (15, 0.13), (20, 0.07)])
                  lines.append(
                      {
                          "line_id": line_id,
                          "order_id": order["order_id"],
                          "product_id": product["product_id"],
                          "quantity": rng.randint(1, 9),
                          "unit_price_cents": max(500, int(product["list_price_cents"] * (100 - discount_pct) / 100)),
                          "discount_pct": discount_pct,
                          "is_promo": 1 if discount_pct >= 10 else 0,
                      }
                  )
                  line_id += 1

          order_by_id = {o["order_id"]: o for o in orders}
          refunds = []
          refund_id = 1
          for l in lines:
              order = order_by_id[l["order_id"]]
              if order["order_status"] != "completed":
                  continue
              if rng.random() < 0.14:
                  gross = l["quantity"] * l["unit_price_cents"]
                  refund_ratio = rng.choice([0.25, 0.5, 1.0])
                  refund_date = min(
                      date(2025, 12, 31),
                      order["order_date"] + timedelta(days=rng.randint(1, 45)),
                  )
                  refunds.append(
                      {
                          "refund_id": f"R{refund_id:06d}",
                          "order_id": l["order_id"],
                          "line_id": l["line_id"],
                          "product_id": l["product_id"],
                          "customer_id": order["customer_id"],
                          "refund_date": refund_date,
                          "refund_cents": int(gross * refund_ratio),
                          "refund_reason": pick_weighted(
                              [
                                  ("product_issue", 0.34),
                                  ("customer_remorse", 0.31),
                                  ("billing_adjustment", 0.20),
                                  ("shipping_delay", 0.15),
                              ]
                          ),
                      }
                  )
                  refund_id += 1

          inventories = []
          for product in products:
              on_hand = rng.randint(15, 420)
              reorder = rng.randint(25, 140)
              if rng.random() < 0.18:
                  on_hand = max(3, reorder - rng.randint(1, 30))
              inventories.append(
                  {
                      "product_id": product["product_id"],
                      "on_hand_qty": on_hand,
                      "reorder_point": reorder,
                      "last_restock_date": random_date(date(2025, 8, 1), date(2025, 12, 31)),
                  }
              )

          sales_reps = []
          rep_teams = [("enterprise_field", 0.32), ("smb_velocity", 0.30), ("partner_success", 0.20), ("renewals", 0.18)]
          for idx in range(1, 25):
              sales_reps.append(
                  {
                      "rep_id": f"SR{idx:03d}",
                      "rep_name": f"Rep {idx:03d}",
                      "team": pick_weighted(rep_teams),
                      "rep_region": pick_weighted(regions),
                  }
              )
          rep_ids = [r["rep_id"] for r in sales_reps]
          order_rep_assignments = []
          for order in orders:
              primary = rng.choice(rep_ids)
              if rng.random() < 0.23:
                  secondary = rng.choice([rid for rid in rep_ids if rid != primary])
                  order_rep_assignments.append({"order_id": order["order_id"], "rep_id": primary, "split_pct": 70})
                  order_rep_assignments.append({"order_id": order["order_id"], "rep_id": secondary, "split_pct": 30})
              else:
                  order_rep_assignments.append({"order_id": order["order_id"], "rep_id": primary, "split_pct": 100})

          carriers = [
              {"carrier_id": "CAR01", "carrier_name": "Northstar Freight", "service_level": "ground"},
              {"carrier_id": "CAR02", "carrier_name": "BlueArrow Logistics", "service_level": "priority"},
              {"carrier_id": "CAR03", "carrier_name": "Pacific Relay", "service_level": "economy"},
              {"carrier_id": "CAR04", "carrier_name": "Nimbus Air Cargo", "service_level": "expedited"},
              {"carrier_id": "CAR05", "carrier_name": "Metro Courier", "service_level": "same_day"},
          ]
          warehouses = []
          for idx in range(1, 9):
              warehouses.append(
                  {
                      "warehouse_id": f"W{idx:02d}",
                      "warehouse_region": pick_weighted(regions),
                      "warehouse_tier": pick_weighted([("tier_a", 0.34), ("tier_b", 0.43), ("tier_c", 0.23)]),
                  }
              )
          line_ids_by_order = defaultdict(list)
          for line in lines:
              line_ids_by_order[line["order_id"]].append(line)
          shipments = []
          shipment_items = []
          shipment_num = 1
          for order in orders:
              if order["order_status"] == "cancelled":
                  continue
              if rng.random() < 0.08:
                  continue
              ship_date = min(date(2025, 12, 31), order["order_date"] + timedelta(days=rng.randint(0, 3)))
              delivery_days = pick_weighted([(1, 0.09), (2, 0.18), (3, 0.22), (4, 0.20), (5, 0.16), (6, 0.10), (7, 0.05)])
              delivered_date = min(date(2025, 12, 31), ship_date + timedelta(days=delivery_days))
              shipment = {
                  "shipment_id": f"S{shipment_num:06d}",
                  "order_id": order["order_id"],
                  "ship_date": ship_date,
                  "delivered_date": delivered_date,
                  "warehouse_id": rng.choice(warehouses)["warehouse_id"],
                  "carrier_id": rng.choice(carriers)["carrier_id"],
                  "shipping_cents": rng.randint(600, 6200),
              }
              shipments.append(shipment)
              for line in line_ids_by_order[order["order_id"]]:
                  damaged_qty = 1 if (line["quantity"] >= 4 and rng.random() < 0.08) else 0
                  delivered_qty = max(0, line["quantity"] - damaged_qty)
                  shipment_items.append(
                      {
                          "shipment_id": shipment["shipment_id"],
                          "line_id": line["line_id"],
                          "delivered_qty": delivered_qty,
                          "damaged_qty": damaged_qty,
                      }
                  )
              shipment_num += 1

          customer_region_history = []
          for customer in customers:
              if rng.random() < 0.24:
                  old_region = rng.choice([r for r, _ in regions if r != customer["region"]])
                  switch_date = random_date(max(customer["signup_date"], date(2024, 1, 1)), date(2025, 8, 31))
                  customer_region_history.append(
                      {
                          "customer_id": customer["customer_id"],
                          "effective_start": customer["signup_date"],
                          "effective_end": switch_date - timedelta(days=1),
                          "region": old_region,
                          "is_current": 0,
                      }
                  )
                  customer_region_history.append(
                      {
                          "customer_id": customer["customer_id"],
                          "effective_start": switch_date,
                          "effective_end": date(2025, 12, 31),
                          "region": customer["region"],
                          "is_current": 1,
                      }
                  )
              else:
                  customer_region_history.append(
                      {
                          "customer_id": customer["customer_id"],
                          "effective_start": customer["signup_date"],
                          "effective_end": date(2025, 12, 31),
                          "region": customer["region"],
                          "is_current": 1,
                      }
                  )

          pricing_history = []
          effective_dates = [date(2025, 1, 1), date(2025, 4, 1), date(2025, 7, 1), date(2025, 10, 1)]
          for product in products:
              list_price = product["list_price_cents"]
              unit_cost = product["unit_cost_cents"]
              for eff in effective_dates:
                  list_price = max(1500, int(list_price * rng.uniform(0.95, 1.05)))
                  unit_cost = max(900, min(list_price - 200, int(unit_cost * rng.uniform(0.95, 1.04))))
                  pricing_history.append(
                      {
                          "product_id": product["product_id"],
                          "effective_date": eff,
                          "list_price_cents": list_price,
                          "unit_cost_cents": unit_cost,
                      }
                  )

          demand_forecast = []
          forecast_months = ["2025-10", "2025-11", "2025-12"]
          for product in products:
              for month in forecast_months:
                  baseline = rng.randint(25, 145)
                  demand_forecast.append({"product_id": product["product_id"], "forecast_month": month, "model_version": 1, "forecast_qty": baseline})
                  demand_forecast.append(
                      {
                          "product_id": product["product_id"],
                          "forecast_month": month,
                          "model_version": 2,
                          "forecast_qty": max(5, int(baseline * rng.uniform(0.90, 1.12))),
                      }
                  )

          support_tickets = []
          for idx in range(1, 1801):
              opened = random_date(date(2025, 1, 1), date(2025, 12, 31))
              support_tickets.append(
                  {
                      "ticket_id": f"T{idx:06d}",
                      "customer_id": rng.choice(customer_ids),
                      "opened_date": opened,
                      "severity": pick_weighted([("sev_1", 0.05), ("sev_2", 0.19), ("sev_3", 0.38), ("sev_4", 0.38)]),
                      "closed_date": min(date(2025, 12, 31), opened + timedelta(days=rng.randint(0, 28))),
                  }
              )

          customer_success_touches = []
          for idx in range(1, 2201):
              customer_success_touches.append(
                  {
                      "touch_id": f"CS{idx:06d}",
                      "customer_id": rng.choice(customer_ids),
                      "touch_date": random_date(date(2025, 1, 1), date(2025, 12, 31)),
                      "touch_type": pick_weighted([("qbr", 0.22), ("training", 0.23), ("adoption_review", 0.28), ("renewal_prep", 0.27)]),
                      "owner_team": pick_weighted([("cs_enterprise", 0.46), ("cs_scaled", 0.39), ("partner_success", 0.15)]),
                  }
              )

          conn = sqlite3.connect(db_path)
          try:
              if model == "standard":
                  conn.executescript(
                      """
                      CREATE TABLE customers (customer_id TEXT PRIMARY KEY, customer_name TEXT NOT NULL, segment TEXT NOT NULL, region TEXT NOT NULL, status TEXT NOT NULL, signup_date TEXT NOT NULL);
                      CREATE TABLE products (product_id TEXT PRIMARY KEY, sku TEXT NOT NULL, category TEXT NOT NULL, subcategory TEXT NOT NULL, supplier_tier TEXT NOT NULL, list_price_cents INTEGER NOT NULL, unit_cost_cents INTEGER NOT NULL);
                      CREATE TABLE orders (order_id TEXT PRIMARY KEY, customer_id TEXT NOT NULL, order_date TEXT NOT NULL, order_status TEXT NOT NULL, channel TEXT NOT NULL, payment_type TEXT NOT NULL);
                      CREATE TABLE order_items (line_id INTEGER PRIMARY KEY, order_id TEXT NOT NULL, product_id TEXT NOT NULL, quantity INTEGER NOT NULL, unit_price_cents INTEGER NOT NULL, discount_pct INTEGER NOT NULL, is_promo INTEGER NOT NULL);
                      CREATE TABLE refund_items (refund_id TEXT PRIMARY KEY, order_id TEXT NOT NULL, line_id INTEGER NOT NULL, product_id TEXT NOT NULL, customer_id TEXT NOT NULL, refund_date TEXT NOT NULL, refund_cents INTEGER NOT NULL, refund_reason TEXT NOT NULL);
                      CREATE TABLE inventory (product_id TEXT PRIMARY KEY, on_hand_qty INTEGER NOT NULL, reorder_point INTEGER NOT NULL, last_restock_date TEXT NOT NULL);
                      CREATE INDEX idx_orders_date_status ON orders(order_date, order_status, customer_id);
                      CREATE INDEX idx_order_items_order ON order_items(order_id, product_id);
                      CREATE INDEX idx_refunds_date_product ON refund_items(refund_date, product_id, customer_id);
                      CREATE INDEX idx_customers_region_status ON customers(region, status, segment);
                      CREATE INDEX idx_inventory_reorder ON inventory(reorder_point, on_hand_qty);
                      """
                  )
                  conn.executemany("INSERT INTO customers VALUES (?, ?, ?, ?, ?, ?)", [(c["customer_id"], c["customer_name"], c["segment"], c["region"], c["status"], c["signup_date"].isoformat()) for c in customers])
                  conn.executemany("INSERT INTO products VALUES (?, ?, ?, ?, ?, ?, ?)", [(p["product_id"], p["sku"], p["category"], p["subcategory"], p["supplier_tier"], p["list_price_cents"], p["unit_cost_cents"]) for p in products])
                  conn.executemany("INSERT INTO orders VALUES (?, ?, ?, ?, ?, ?)", [(o["order_id"], o["customer_id"], o["order_date"].isoformat(), o["order_status"], o["channel"], o["payment_type"]) for o in orders])
                  conn.executemany("INSERT INTO order_items VALUES (?, ?, ?, ?, ?, ?, ?)", [(l["line_id"], l["order_id"], l["product_id"], l["quantity"], l["unit_price_cents"], l["discount_pct"], l["is_promo"]) for l in lines])
                  conn.executemany(
                      "INSERT INTO refund_items VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                      [
                          (
                              r["refund_id"],
                              r["order_id"],
                              r["line_id"],
                              r["product_id"],
                              r["customer_id"],
                              r["refund_date"].isoformat(),
                              r["refund_cents"],
                              r["refund_reason"],
                          )
                          for r in refunds
                      ],
                  )
                  conn.executemany("INSERT INTO inventory VALUES (?, ?, ?, ?)", [(i["product_id"], i["on_hand_qty"], i["reorder_point"], i["last_restock_date"].isoformat()) for i in inventories])
              elif model == "wide_flat":
                  conn.executescript(
                      """
                      CREATE TABLE sales_wide (
                        order_id TEXT NOT NULL, line_id INTEGER NOT NULL, order_date TEXT NOT NULL, order_status TEXT NOT NULL, channel TEXT NOT NULL, payment_type TEXT NOT NULL,
                        customer_id TEXT NOT NULL, customer_name TEXT NOT NULL, customer_segment TEXT NOT NULL, customer_region TEXT NOT NULL, customer_status TEXT NOT NULL, customer_signup_date TEXT NOT NULL,
                        product_id TEXT NOT NULL, sku TEXT NOT NULL, product_category TEXT NOT NULL, product_subcategory TEXT NOT NULL, supplier_tier TEXT NOT NULL,
                        quantity INTEGER NOT NULL, unit_price_cents INTEGER NOT NULL, discount_pct INTEGER NOT NULL, is_promo INTEGER NOT NULL, line_revenue_cents INTEGER NOT NULL,
                        refund_date TEXT NOT NULL, refunded_cents INTEGER NOT NULL, on_hand_qty INTEGER NOT NULL, reorder_point INTEGER NOT NULL, last_restock_date TEXT NOT NULL
                      );
                      CREATE INDEX idx_sales_wide_order_date ON sales_wide(order_date, order_status);
                      CREATE INDEX idx_sales_wide_customer ON sales_wide(customer_id, customer_segment, customer_region);
                      CREATE INDEX idx_sales_wide_product ON sales_wide(product_id, product_category, product_subcategory);
                      CREATE INDEX idx_sales_wide_stock ON sales_wide(reorder_point, on_hand_qty);
                      """
                  )
                  c_by_id = {c["customer_id"]: c for c in customers}
                  p_by_id = {p["product_id"]: p for p in products}
                  o_by_id = {o["order_id"]: o for o in orders}
                  i_by_id = {i["product_id"]: i for i in inventories}
                  refund_by_line_id = {r["line_id"]: r for r in refunds}
                  payload = []
                  for l in lines:
                      o = o_by_id[l["order_id"]]
                      c = c_by_id[o["customer_id"]]
                      p = p_by_id[l["product_id"]]
                      inv = i_by_id[l["product_id"]]
                      refund = refund_by_line_id.get(l["line_id"])
                      payload.append((o["order_id"], l["line_id"], o["order_date"].isoformat(), o["order_status"], o["channel"], o["payment_type"], c["customer_id"], c["customer_name"], c["segment"], c["region"], c["status"], c["signup_date"].isoformat(), p["product_id"], p["sku"], p["category"], p["subcategory"], p["supplier_tier"], l["quantity"], l["unit_price_cents"], l["discount_pct"], l["is_promo"], l["quantity"] * l["unit_price_cents"], (refund["refund_date"].isoformat() if refund else ""), (refund["refund_cents"] if refund else 0), inv["on_hand_qty"], inv["reorder_point"], inv["last_restock_date"].isoformat()))
                  conn.executemany("INSERT INTO sales_wide VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)", payload)
              else:
                  conn.executescript(
                      """
                      CREATE TABLE dim_customer (customer_sk INTEGER PRIMARY KEY, customer_id TEXT NOT NULL UNIQUE, segment TEXT NOT NULL, region TEXT NOT NULL, status TEXT NOT NULL, signup_date TEXT NOT NULL);
                      CREATE TABLE dim_product (product_sk INTEGER PRIMARY KEY, product_id TEXT NOT NULL UNIQUE, category TEXT NOT NULL, subcategory TEXT NOT NULL, supplier_tier TEXT NOT NULL, list_price_cents INTEGER NOT NULL, unit_cost_cents INTEGER NOT NULL);
                      CREATE TABLE fact_sales (
                        event_date TEXT NOT NULL, order_id TEXT NOT NULL, line_id INTEGER NOT NULL, customer_sk INTEGER NOT NULL, product_sk INTEGER NOT NULL,
                        channel TEXT NOT NULL, payment_type TEXT NOT NULL, order_status TEXT NOT NULL, quantity INTEGER NOT NULL, unit_price_cents INTEGER NOT NULL,
                        discount_pct INTEGER NOT NULL, is_promo INTEGER NOT NULL, line_revenue_cents INTEGER NOT NULL
                      );
                      CREATE TABLE fact_refunds (
                        refund_date TEXT NOT NULL, refund_id TEXT NOT NULL, order_id TEXT NOT NULL, line_id INTEGER NOT NULL,
                        customer_sk INTEGER NOT NULL, product_sk INTEGER NOT NULL, refund_cents INTEGER NOT NULL, refund_reason TEXT NOT NULL
                      );
