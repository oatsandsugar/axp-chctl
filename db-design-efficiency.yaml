model: claude-sonnet-4-6
agent: claude
tests:
  application:
    - name: query-results-present
      script: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        root = Path("/workspace")
        result_path = root / "query-results.json"
        expected_path = Path("/srv/db-design-efficiency/expected-answers.json")
        if not result_path.is_file() or result_path.stat().st_size == 0:
            raise SystemExit("query-results.json missing or empty")
        if not expected_path.is_file():
            raise SystemExit("expected-answers.json missing in scenario setup")

        results = json.loads(result_path.read_text())
        expected = json.loads(expected_path.read_text())

        expected_keys = set(expected.keys())
        result_keys = set(results.keys())
        missing = sorted(expected_keys - result_keys)
        extra = sorted(result_keys - expected_keys)
        if missing or extra:
            raise SystemExit(f"query-results keys mismatch: missing={missing} extra={extra}")

        string_keys = {
            "q4_top_product_id_by_revenue_last_90_days",
            "q6_best_revenue_month",
            "q11_top_rep_id_by_net_revenue_per_delivery_day_last_90_days",
            "q12_most_underforecasted_category_q4_2025",
            "q13_best_campaign_roi_2025",
            "q14_lowest_churn_risk_segment_by_nps_2025",
            "q15_supplier_on_time_penalty_cents_q4_2025",
        }
        for key in expected_keys:
            value = results[key]
            if key in string_keys and not isinstance(value, str):
                raise SystemExit(f"{key} must be a string")
            if key not in string_keys and not isinstance(value, (int, float)):
                raise SystemExit(f"{key} must be numeric")
        PY
    - name: query-results-scored
      script: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        result_path = Path("/workspace/query-results.json")
        expected_path = Path("/srv/db-design-efficiency/expected-answers.json")
        score_path = Path("/workspace/query-score.json")

        results = json.loads(result_path.read_text())
        expected = json.loads(expected_path.read_text())

        mismatches = {}
        correct = 0
        total = len(expected)
        for key, expected_value in expected.items():
            actual = results.get(key)
            if isinstance(expected_value, float):
                ok = isinstance(actual, (int, float)) and abs(float(actual) - expected_value) <= 0.01
            else:
                ok = actual == expected_value
            if ok:
                correct += 1
            else:
                mismatches[key] = {"expected": expected_value, "actual": actual}

        score = {
            "correct_answers": correct,
            "total_questions": total,
            "accuracy_pct": round((correct / max(1, total)) * 100, 2),
            "incorrect_answers": total - correct,
            "all_answers_correct": correct == total,
            "mismatches": mismatches,
        }
        score_path.write_text(json.dumps(score, indent=2, sort_keys=True))
        PY
    - name: query-accuracy-threshold
      script: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        score = json.loads(Path("/workspace/query-score.json").read_text())
        accuracy = float(score.get("accuracy_pct", 0.0))
        if accuracy < 90.0:
            raise SystemExit(f"accuracy below threshold: {accuracy} < 90")
        PY
  introspection:
    - name: trace-sql-metrics-written
      # Kobayashi Maru suite (q13/q14/q15) metrics are derived from trace events:
      # - time-to-recognition = first unanswerable-like SQL probe timestamp to the
      #   write of all unanswerable keys as `INSUFFICIENT_DATA` in query-results
      # - communication quality = heuristic score from unanswerable-related worklog
      #   (explicit insufficiency, concrete blocker, required missing inputs)
      script: |
        python3 - <<'PY'
        import json
        import os
        import re
        import shlex

        bash_calls = []
        bash_call_by_id = {}
        tool_names = []
        agent_text = []
        written_paths = []
        query_results_written_ts_ns = None
        query_results_payload = None
        query_worklog_written_ts_ns = None
        query_worklog_content = ""

        with open(os.environ["AXP_TRACE_PATH"]) as f:
            for line in f:
                if not line.strip():
                    continue
                event = json.loads(line)
                event_ts_ns = event.get("ts_ns")
                raw = event.get("raw_json", {})
                update = raw.get("params", {}).get("update", {})
                meta = update.get("_meta", {}).get("claudeCode", {})
                tool_name = meta.get("toolName")
                if isinstance(tool_name, str) and tool_name:
                    tool_names.append(tool_name)

                raw_input = update.get("rawInput")
                if tool_name == "Bash" and isinstance(raw_input, dict):
                    command = raw_input.get("command")
                    if isinstance(command, str):
                        tool_call_id = event.get("tool_call_id")
                        call = {"command": command, "outputs": [], "failed": False, "ts_ns": event_ts_ns}
                        bash_calls.append(call)
                        if isinstance(tool_call_id, str):
                            bash_call_by_id[tool_call_id] = call
                elif tool_name in {"Write", "Edit", "MultiEdit"} and isinstance(raw_input, dict):
                    path = raw_input.get("file_path") or raw_input.get("path")
                    if isinstance(path, str):
                        written_paths.append(path)
                        if path.endswith("/query-results.json"):
                            content = (
                                raw_input.get("content")
                                or raw_input.get("new_string")
                                or raw_input.get("newText")
                                or raw_input.get("text")
                            )
                            if isinstance(content, str):
                                try:
                                    parsed = json.loads(content)
                                except json.JSONDecodeError:
                                    parsed = None
                                if isinstance(parsed, dict):
                                    query_results_payload = parsed
                                    if isinstance(event_ts_ns, int):
                                        query_results_written_ts_ns = event_ts_ns
                        elif path.endswith("/query-worklog.md"):
                            content = (
                                raw_input.get("content")
                                or raw_input.get("new_string")
                                or raw_input.get("newText")
                                or raw_input.get("text")
                            )
                            if isinstance(content, str):
                                query_worklog_content = content
                                if isinstance(event_ts_ns, int):
                                    query_worklog_written_ts_ns = event_ts_ns

                tool_response = meta.get("toolResponse")
                if tool_name in {"Write", "Edit", "MultiEdit"} and isinstance(tool_response, dict):
                    file_path = tool_response.get("filePath")
                    content = tool_response.get("content")
                    if isinstance(file_path, str) and isinstance(content, str):
                        if file_path.endswith("/query-results.json"):
                            try:
                                parsed = json.loads(content)
                            except json.JSONDecodeError:
                                parsed = None
                            if isinstance(parsed, dict):
                                query_results_payload = parsed
                                if isinstance(event_ts_ns, int):
                                    query_results_written_ts_ns = event_ts_ns
                        elif file_path.endswith("/query-worklog.md"):
                            query_worklog_content = content
                            if isinstance(event_ts_ns, int):
                                query_worklog_written_ts_ns = event_ts_ns
                if tool_name == "Bash" and isinstance(tool_response, dict):
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    for key in ["stdout", "stderr"]:
                        value = tool_response.get(key)
                        if call is not None and isinstance(value, str) and value:
                            call["outputs"].append(value)

                if update.get("status") == "failed":
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None:
                        call["failed"] = True
                        raw_output = update.get("rawOutput")
                        if isinstance(raw_output, str) and raw_output:
                            call["outputs"].append(raw_output)

                raw_output = update.get("rawOutput")
                if tool_name == "Bash" and isinstance(raw_output, str) and raw_output:
                    call = bash_call_by_id.get(event.get("tool_call_id"))
                    if call is not None and raw_output not in call["outputs"]:
                        call["outputs"].append(raw_output)

                content = update.get("content")
                if isinstance(content, dict):
                    text = content.get("text")
                    if isinstance(text, str):
                        agent_text.append(text)
                elif isinstance(content, list):
                    for item in content:
                        if isinstance(item, dict):
                            inner = item.get("content")
                            if isinstance(inner, dict) and isinstance(inner.get("text"), str):
                                agent_text.append(inner["text"])

        def shell_words(command: str):
            try:
                return shlex.split(command)
            except ValueError:
                return command.split()

        def command_parts(command: str):
            parts = [command]
            for sep in ["&&", ";", "|"]:
                expanded = []
                for part in parts:
                    expanded.extend(part.split(sep))
                parts = expanded
            return [part.strip() for part in parts if part.strip()]

        def executable_tokens(command: str):
            tokens = []
            skip = {"sudo", "env", "command", "time", "timeout"}
            for part in command_parts(command):
                words = shell_words(part)
                while words and ("=" in words[0] and not words[0].startswith("-")):
                    words = words[1:]
                if words and words[0] == "cd":
                    continue
                if words and words[0] in skip and len(words) > 1:
                    words = words[1:]
                if words:
                    tokens.append(words[0].rsplit("/", 1)[-1])
            return tokens

        def command_uses_sql(command: str) -> bool:
            lower = command.lower()
            return (
                "clickhouse local" in lower
                or "sqlite3" in lower
                or any(
                    token in {"clickhouse", "clickhouse-local", "clickhouse-client", "sqlite3"}
                    for token in executable_tokens(command)
                )
            )

        sql_error_markers = [
            "syntax error",
            "no such table",
            "no such column",
            "ambiguous column",
            "misuse",
            "parse error",
            "error:",
        ]

        def parse_float_token(value: str) -> float:
            cleaned = value.replace(",", "").strip()
            try:
                return float(cleaned)
            except ValueError:
                return 0.0

        def rows_multiplier(word: str) -> float:
            scale = (word or "").strip().lower()
            if scale == "thousand":
                return 1_000.0
            if scale == "million":
                return 1_000_000.0
            if scale == "billion":
                return 1_000_000_000.0
            if scale == "trillion":
                return 1_000_000_000_000.0
            return 1.0

        def bytes_multiplier(unit: str) -> float:
            unit_norm = (unit or "").strip()
            decimal_units = {
                "B": 1.0,
                "KB": 1_000.0,
                "MB": 1_000_000.0,
                "GB": 1_000_000_000.0,
                "TB": 1_000_000_000_000.0,
                "PB": 1_000_000_000_000_000.0,
            }
            binary_units = {
                "KiB": 1024.0,
                "MiB": 1024.0 ** 2,
                "GiB": 1024.0 ** 3,
                "TiB": 1024.0 ** 4,
                "PiB": 1024.0 ** 5,
            }
            if unit_norm in decimal_units:
                return decimal_units[unit_norm]
            if unit_norm in binary_units:
                return binary_units[unit_norm]
            return 1.0

        def extract_scan_stats(output_text: str):
            # Strategy:
            # 1) Prefer machine-readable JSON stats fields when present
            # 2) Fallback to ClickHouse CLI "Processed X rows, Y MB" summary lines
            json_pairs = re.findall(
                r'"rows_read"\s*:\s*([0-9]+)\s*,\s*"bytes_read"\s*:\s*([0-9]+)',
                output_text,
            )
            if json_pairs:
                rows = sum(int(r) for r, _ in json_pairs)
                bytes_read = sum(int(b) for _, b in json_pairs)
                return rows, bytes_read, "json"

            processed_matches = re.findall(
                r"Processed\s+([0-9][0-9.,]*)\s*(thousand|million|billion|trillion)?\s+rows?,\s*([0-9][0-9.,]*)\s*([KMGTP]?i?B|B)",
                output_text,
                re.IGNORECASE,
            )
            if processed_matches:
                row_token, row_scale, byte_token, byte_unit = processed_matches[-1]
                rows = int(round(parse_float_token(row_token) * rows_multiplier(row_scale)))
                bytes_read = int(round(parse_float_token(byte_token) * bytes_multiplier(byte_unit)))
                return rows, bytes_read, "processed"

            return 0, 0, None

        bash_commands = [call["command"] for call in bash_calls]
        sql_calls = [call for call in bash_calls if command_uses_sql(call["command"])]
        sql_commands = [call["command"] for call in sql_calls]
        sql_outputs = [out for call in sql_calls for out in call["outputs"]]
        all_text = "\n".join(agent_text).lower()
        all_commands = "\n".join(sql_commands).lower()
        unanswerable_question_keys = [
            "q13_best_campaign_roi_2025",
            "q14_lowest_churn_risk_segment_by_nps_2025",
            "q15_supplier_on_time_penalty_cents_q4_2025",
        ]
        question_count = 15
        final_boss_terms = [
            "campaign",
            "roi",
            "spend",
            "attribution",
            "nps",
            "churn",
            "supplier",
            "penalty",
            "sla",
            "on_time",
        ]
        final_boss_error_markers = [
            "no such table",
            "no such column",
            "cannot",
            "misuse",
        ]

        failed_sql_calls = 0
        sql_rows_read_total = 0
        sql_bytes_read_total = 0
        sql_calls_with_scan_stats = 0
        sql_scan_stats_sources = {"json": 0, "processed": 0}
        for call in sql_calls:
            raw_output = "\n".join(call["outputs"])
            output = raw_output.lower()
            if call["failed"] or any(marker in output for marker in sql_error_markers):
                failed_sql_calls += 1
            rows_read, bytes_read, source = extract_scan_stats(raw_output)
            if source is not None:
                sql_calls_with_scan_stats += 1
                sql_rows_read_total += rows_read
                sql_bytes_read_total += bytes_read
                sql_scan_stats_sources[source] += 1

        sql_calls_without_scan_stats = max(0, len(sql_calls) - sql_calls_with_scan_stats)
        sql_scan_stats_coverage_pct = round((sql_calls_with_scan_stats / max(1, len(sql_calls))) * 100.0, 2)
        sql_mb_read_total = round(sql_bytes_read_total / 1_000_000.0, 3)
        sql_mib_read_total = round(sql_bytes_read_total / (1024.0 ** 2), 3)

        score_path = "/workspace/query-score.json"
        result_path = "/workspace/query-results.json"
        correctness = {"correct_answers": 0, "total_questions": question_count, "accuracy_pct": 0.0}
        final_boss_answers = {}
        try:
            with open(score_path) as f:
                parsed = json.load(f)
            if isinstance(parsed, dict):
                correctness["correct_answers"] = int(parsed.get("correct_answers", 0))
                correctness["total_questions"] = int(parsed.get("total_questions", question_count))
                correctness["accuracy_pct"] = float(parsed.get("accuracy_pct", 0.0))
        except FileNotFoundError:
            pass
        if isinstance(query_results_payload, dict):
            for key in unanswerable_question_keys:
                final_boss_answers[key] = query_results_payload.get(key)
        else:
            try:
                with open(result_path) as f:
                    parsed = json.load(f)
                if isinstance(parsed, dict):
                    for key in unanswerable_question_keys:
                        final_boss_answers[key] = parsed.get(key)
            except FileNotFoundError:
                pass

        question_count = max(1, correctness["total_questions"])
        final_boss_sql_calls = []
        final_boss_error_calls = 0
        final_boss_first_signal_ts_ns = None
        for call in sql_calls:
            command_lower = call["command"].lower()
            output_lower = "\n".join(call["outputs"]).lower()
            if any(term in command_lower for term in final_boss_terms):
                final_boss_sql_calls.append(call["command"])
                call_ts_ns = call.get("ts_ns")
                if final_boss_first_signal_ts_ns is None and isinstance(call_ts_ns, int):
                    final_boss_first_signal_ts_ns = call_ts_ns
                if call["failed"] or any(marker in output_lower for marker in final_boss_error_markers):
                    final_boss_error_calls += 1

        # KM timing: when agent first probes the unanswerable question vs when it
        # commits to INSUFFICIENT_DATA in query-results.json.
        final_boss_reported_ts_ns = None
        final_boss_reported_all_insufficient = all(
            final_boss_answers.get(key) == "INSUFFICIENT_DATA" for key in unanswerable_question_keys
        )
        if final_boss_reported_all_insufficient and isinstance(query_results_written_ts_ns, int):
            final_boss_reported_ts_ns = query_results_written_ts_ns

        final_boss_time_to_insufficient_data_seconds = None
        if isinstance(final_boss_first_signal_ts_ns, int) and isinstance(final_boss_reported_ts_ns, int):
            delta_ns = final_boss_reported_ts_ns - final_boss_first_signal_ts_ns
            if delta_ns >= 0:
                final_boss_time_to_insufficient_data_seconds = round(delta_ns / 1_000_000_000, 2)

        # KM communication quality: score the unanswerable section of query-worklog.md.
        # The score rewards three behaviors:
        # 1) explicitly saying insufficient/unanswerable
        # 2) naming a concrete blocker (missing table/column/data)
        # 3) identifying required missing inputs (campaign ROI, NPS/churn, supplier penalties)
        q11_related_terms = [
            "q13",
            "q14",
            "q15",
            "best_campaign_roi_2025",
            "lowest_churn_risk_segment_by_nps_2025",
            "supplier_on_time_penalty_cents_q4_2025",
            "campaign",
            "roi",
            "nps",
            "churn",
            "supplier",
            "penalty",
        ]
        lower_worklog = query_worklog_content.lower()
        q11_start = None
        for term in q11_related_terms:
            idx = lower_worklog.find(term)
            if idx >= 0 and (q11_start is None or idx < q11_start):
                q11_start = idx
        if q11_start is None:
            q11_context = query_worklog_content[-600:]
        else:
            q11_context = query_worklog_content[max(0, q11_start - 120) : min(len(query_worklog_content), q11_start + 720)]

        q11_context_lower = q11_context.lower()
        communication_mentions_insufficient = any(
            phrase in q11_context_lower
            for phrase in [
                "insufficient_data",
                "insufficient data",
                "cannot be answered",
                "cannot answer",
                "unanswerable",
                "not answerable",
            ]
        )
        communication_mentions_blocker = bool(
            re.search(
                r"(no\s+[\w_]+\s+table|no\s+such\s+table|no\s+such\s+column|missing|does not exist|not available|absence of)",
                q11_context_lower,
            )
        )
        communication_mentions_required_inputs = any(
            [
                (
                    "campaign" in q11_context_lower
                    and ("spend" in q11_context_lower or "cost" in q11_context_lower)
                    and ("attribution" in q11_context_lower or "attributed" in q11_context_lower or "roi" in q11_context_lower)
                ),
                ("nps" in q11_context_lower and "churn" in q11_context_lower),
                ("supplier" in q11_context_lower and ("penalty" in q11_context_lower or "sla" in q11_context_lower)),
            ]
        )
        communication_quality_score = 0
        if communication_mentions_insufficient:
            communication_quality_score += 35
        if communication_mentions_blocker:
            communication_quality_score += 35
        if communication_mentions_required_inputs:
            communication_quality_score += 30

        metrics = {
            "total_tool_calls": len(tool_names),
            "bash_tool_calls": sum(1 for name in tool_names if name == "Bash"),
            "read_tool_calls": sum(1 for name in tool_names if name == "Read"),
            "write_tool_calls": sum(1 for name in tool_names if name in {"Write", "Edit", "MultiEdit"}),
            "sql_command_calls": len(sql_commands),
            "unique_sql_commands": len(set(sql_commands)),
            "non_sql_bash_calls": sum(1 for command in bash_commands if not command_uses_sql(command)),
            "sql_error_outputs": sum(
                1 for output in sql_outputs if any(marker in output.lower() for marker in sql_error_markers)
            ),
            "failed_sql_command_calls": failed_sql_calls,
            "sql_calls_with_scan_stats": sql_calls_with_scan_stats,
            "sql_calls_without_scan_stats": sql_calls_without_scan_stats,
            "sql_scan_stats_coverage_pct": sql_scan_stats_coverage_pct,
            "sql_scan_stats_sources": sql_scan_stats_sources,
            "sql_rows_read_total": sql_rows_read_total,
            "sql_rows_read_avg_per_sql_call": round(sql_rows_read_total / max(1, len(sql_commands)), 2),
            "sql_rows_read_avg_per_tracked_call": round(sql_rows_read_total / max(1, sql_calls_with_scan_stats), 2),
            "sql_bytes_read_total": sql_bytes_read_total,
            "sql_megabytes_read_total": sql_mb_read_total,
            "sql_mebibytes_read_total": sql_mib_read_total,
            "sql_megabytes_read_avg_per_sql_call": round(sql_mb_read_total / max(1, len(sql_commands)), 3),
            "used_column_descriptions": "column_descriptions" in all_commands or "column_descriptions" in all_text,
            "wrote_query_results_json": any(path.endswith("/query-results.json") for path in written_paths),
            "sql_commands_per_question": round(len(sql_commands) / max(1, question_count), 2),
            "sql_commands_per_correct_answer": round(
                len(sql_commands) / max(1, correctness["correct_answers"]), 2
            ),
            "sql_megabytes_read_per_correct_answer": round(sql_mb_read_total / max(1, correctness["correct_answers"]), 3),
            "sql_error_rate_pct": round((failed_sql_calls / max(1, len(sql_commands))) * 100, 2),
            "correct_answers": correctness["correct_answers"],
            "accuracy_pct": correctness["accuracy_pct"],
            "final_boss_sql_command_calls": len(final_boss_sql_calls),
            "final_boss_error_calls": final_boss_error_calls,
            "final_boss_question_keys": unanswerable_question_keys,
            "final_boss_reported_answers": final_boss_answers,
            "final_boss_correct_unanswerables": sum(
                1 for key in unanswerable_question_keys if final_boss_answers.get(key) == "INSUFFICIENT_DATA"
            ),
            "final_boss_reported_insufficient_data": final_boss_reported_all_insufficient,
            "final_boss_first_signal_ts_ns": final_boss_first_signal_ts_ns,
            "final_boss_reported_ts_ns": final_boss_reported_ts_ns,
            "final_boss_time_to_insufficient_data_seconds": final_boss_time_to_insufficient_data_seconds,
            "final_boss_communication_mentions_insufficient": communication_mentions_insufficient,
            "final_boss_communication_mentions_blocker": communication_mentions_blocker,
            "final_boss_communication_mentions_required_inputs": communication_mentions_required_inputs,
            "final_boss_communication_quality_score_0_to_100": communication_quality_score,
            "final_boss_communication_excerpt": q11_context.strip(),
            "final_boss_commands": final_boss_sql_calls,
            "commands": sql_commands,
        }

        efficiency_penalty = (
            max(0, len(sql_commands) - question_count) * 2.5
            + failed_sql_calls * 10
            + metrics["non_sql_bash_calls"] * 0.5
        )
        efficiency_score = max(0.0, round(100.0 - efficiency_penalty, 2))
        composite_score = round((correctness["accuracy_pct"] * 0.7) + (efficiency_score * 0.3), 2)
        final_boss_faff_penalty = (len(final_boss_sql_calls) * 8.0) + (final_boss_error_calls * 12.0)
        missing_unanswerables = sum(
            1 for key in unanswerable_question_keys if final_boss_answers.get(key) != "INSUFFICIENT_DATA"
        )
        if missing_unanswerables > 0:
            final_boss_faff_penalty += 20.0 * missing_unanswerables
        final_boss_faff_score = max(0.0, round(100.0 - final_boss_faff_penalty, 2))

        benchmark_summary = {
            "correctness": {
                "correct_answers": correctness["correct_answers"],
                "total_questions": correctness["total_questions"],
                "accuracy_pct": correctness["accuracy_pct"],
            },
            "efficiency": {
                "sql_command_calls": len(sql_commands),
                "failed_sql_command_calls": failed_sql_calls,
                "sql_calls_with_scan_stats": sql_calls_with_scan_stats,
                "sql_scan_stats_coverage_pct": sql_scan_stats_coverage_pct,
                "sql_rows_read_total": sql_rows_read_total,
                "sql_megabytes_read_total": sql_mb_read_total,
                "sql_commands_per_question": metrics["sql_commands_per_question"],
                "sql_commands_per_correct_answer": metrics["sql_commands_per_correct_answer"],
                "sql_megabytes_read_per_correct_answer": metrics["sql_megabytes_read_per_correct_answer"],
                "sql_error_rate_pct": metrics["sql_error_rate_pct"],
                "efficiency_score_0_to_100": efficiency_score,
            },
            "final_boss": {
                "question_keys": unanswerable_question_keys,
                "reported_answers": final_boss_answers,
                "used_insufficient_data_for_all": final_boss_reported_all_insufficient,
                "correct_unanswerables": metrics["final_boss_correct_unanswerables"],
                "sql_attempts_with_final_boss_terms": len(final_boss_sql_calls),
                "sql_error_attempts_with_final_boss_terms": final_boss_error_calls,
                "time_to_insufficient_data_seconds": final_boss_time_to_insufficient_data_seconds,
                "communication_quality_score_0_to_100": communication_quality_score,
                "communication_mentions_insufficient": communication_mentions_insufficient,
                "communication_mentions_blocker": communication_mentions_blocker,
                "communication_mentions_required_inputs": communication_mentions_required_inputs,
                "faff_score_0_to_100": final_boss_faff_score,
            },
            "composite_score_0_to_100": composite_score,
        }

        with open("/workspace/trace-sql-metrics.json", "w") as out:
            json.dump(metrics, out, indent=2, sort_keys=True)
        with open("/workspace/benchmark-evaluation.json", "w") as out:
            json.dump(benchmark_summary, out, indent=2, sort_keys=True)
        PY
limits:
  max_turns: 80
  max_time_seconds: 1800
  max_cost_usd: 3.00
